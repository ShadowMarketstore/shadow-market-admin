<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion du Logo - Shadow Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .preview-box { width: 250px; height: 250px; border: 2px dashed #00ffff; margin: 20px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        #status { color: #00ffff; font-weight: bold; margin: 10px; min-height: 20px; }
        button { background: #00ffff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; color: black; border-radius: 5px; }
        button:disabled { background: #555; }
    </style>
</head>
<body>
    <h1>Gestion du Logo</h1>
    
    <div class="preview-box" id="previewContainer"><span>Aperçu</span></div>
    
    <input type="file" id="logoInput" accept="image/*">
    <div id="status"></div>
    <button id="applyBtn">APPLIQUER</button>

    <script>
        const supabase = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');
        const input = document.getElementById('logoInput');
        const preview = document.getElementById('previewContainer');
        const btn = document.getElementById('applyBtn');
        const status = document.getElementById('status');

        // 1. APERÇU IMMÉDIAT
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.innerHTML = `<img src="${event.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        };

        // 2. ENVOI AVEC ANIMATION
        btn.onclick = async () => {
            const file = input.files[0];
            if (!file) return alert('Sélectionne une image d\'abord !');
            
            // Lancer l'animation
            btn.disabled = true;
            btn.innerText = "CHARGEMENT...";
            status.innerText = "⏳ En cours d'application...";

            try {
                const { error } = await supabase.storage
                    .from('logos')
                    .upload('site-logo.png', file, { upsert: true });

                if (error) throw error;
                
                status.innerText = "✅ Succès : Modifications appliquées !";
                setTimeout(() => { status.innerText = ""; }, 3000);
            } catch (err) {
                status.innerText = "❌ Erreur : " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "APPLIQUER";
            }
        };
    </script>
</body>
</html>
