<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer le Logo - Shadow Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #00ffff; }
        .preview-box { width: 200px; height: 200px; border: 2px dashed #00ffff; margin: 20px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #111; }
        .preview-box img { max-width: 100%; max-height: 100%; }
        input[type="file"] { margin-bottom: 20px; }
        button { background-color: #00ffff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; color: black; border-radius: 5px; }
        button:hover { background-color: #00cccc; }
        .back-link { margin-top: 20px; color: #aaa; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Gestion du Logo</h1>
    <div class="preview-box" id="previewContainer">
        <span>Prévisualisation</span>
    </div>
    <input type="file" id="logoInput" accept="image/*">
    <button id="applyBtn">APPLIQUER LE LOGO</button>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au tableau de bord</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const logoInput = document.getElementById('logoInput');
        const previewContainer = document.getElementById('previewContainer');
        const applyBtn = document.getElementById('applyBtn');

        logoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewContainer.innerHTML = `<img src="${event.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        };

        applyBtn.onclick = async () => {
            const file = logoInput.files[0];
            if (!file) return alert('Veuillez sélectionner un logo.');
            
            applyBtn.innerText = "Chargement...";
            
            const { data, error } = await supabase.storage
                .from('logos')
                .upload('site-logo.png', file, { upsert: true });

            if (error) {
                alert('Erreur lors de l\'envoi : ' + error.message);
            } else {
                alert('Logo mis à jour avec succès !');
            }
            applyBtn.innerText = "APPLIQUER LE LOGO";
        };
    </script>
</body>
</html>
