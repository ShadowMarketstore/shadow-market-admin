<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Logo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: #fff; padding: 20px; text-align: center; font-family: sans-serif; }
        .box { width: 250px; height: 250px; border: 2px dashed #00ffff; margin: 20px auto; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .box img { max-width: 100%; max-height: 100%; }
        #log { margin: 20px 0; color: #00ffff; font-weight: bold; }
        button { background: #00ffff; padding: 15px 30px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Gestion Logo</h1>
    <div class="box" id="p">Aperçu</div>
    <input type="file" id="f" accept="image/*">
    <div id="log">En attente...</div>
    <button id="b">APPLIQUER</button>

    <script>
        // Initialisation forcée
        const sb = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');
        
        const fileInput = document.getElementById('f');
        const preview = document.getElementById('p');
        const log = document.getElementById('log');
        const btn = document.getElementById('b');

        // Prévisualisation forcée
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                preview.innerHTML = '<img src="' + event.target.result + '">';
                log.innerText = "Image chargée en mémoire.";
            };
            reader.readAsDataURL(file);
        });

        // Upload forcé
        btn.onclick = async function() {
            const file = fileInput.files[0];
            if (!file) { log.innerText = "Erreur : Pas d'image !"; return; }
            
            btn.innerText = "CHARGEMENT...";
            log.innerText = "Envoi vers Supabase en cours...";

            try {
                const { error } = await sb.storage
                    .from('logos')
                    .upload('site-logo.png', file, { upsert: true });

                if (error) throw error;
                log.innerText = "SUCCÈS : Image mise à jour !";
                btn.innerText = "APPLIQUER";
            } catch (err) {
                log.innerText = "ERREUR : " + err.message;
                btn.innerText = "APPLIQUER";
            }
        };
    </script>
</body>
</html>
