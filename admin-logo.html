<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Auto Adaptatif</title>
    <style>
        /* Base mobile-first */
        body { 
            margin: 0; background-color: #0a0a0a; color: white; 
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; padding: 15px; 
        }

        /* Le conteneur s'adapte à la largeur disponible */
        .container { 
            width: 100%; max-width: 500px; display: flex; 
            flex-direction: column; align-items: center; 
        }

        .preview-box { 
            width: 100%; /* S'adapte à l'écran */
            aspect-ratio: 1 / 1; /* Reste un carré parfait */
            border: 2px dashed #00ffff; margin: 20px 0; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; background: #111; 
        }
        
        .preview-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        button { 
            width: 100%; /* Bouton pleine largeur sur mobile */
            padding: 15px; background: #00ffff; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer; 
        }

        /* Ajustement si l'écran est large (PC) */
        @media (min-width: 600px) {
            button { width: 300px; } /* Le bouton devient fixe sur PC */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestion du Logo</h1>
        <div class="preview-box" id="previewContainer"><span>Aperçu</span></div>
        <input type="file" id="logoInput" accept="image/*">
        <div id="statusMessage"></div>
        <button id="applyBtn">APPLIQUER</button>
    </div>
    </body>
</html>
