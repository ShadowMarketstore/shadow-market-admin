<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Performances Partenaires</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; padding: 15px; box-sizing: border-box; }
        
        /* Titres néon adaptés pour mobile */
        h1 { color: #00ffff; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 10px #00ffff; font-size: 22px; margin: 0; }
        h2 { color: #00ffff; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 8px #00ffff; font-size: 16px; margin-top: 30px; margin-bottom: 10px; }
        
        .admin-container { max-width: 800px; margin: 0 auto; }
        
        /* En-tête flexible pour éviter les chevauchements */
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        
        .btn-nav { background: transparent; color: #00ffff; border: 2px solid #00ffff; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; text-decoration: none; box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); font-size: 12px; text-align: center; min-width: 110px; }
        .btn-nav:hover { background: #00ffff; color: black; box-shadow: 0 0 15px #00ffff; }

        /* Correction de la visibilité et du défilement des tableaux sur mobile */
        .table-container { background: #111; border: 1px solid #333; border-radius: 10px; margin-top: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.5); overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 400px; }
        th { background: #00ffff; color: black; padding: 12px 10px; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 13px; color: #ffffff !important; }
        tr:hover { background: #161616; }
        
        .creator-icon { font-size: 16px; margin-right: 5px; vertical-align: middle; }
        .badge-code { background: #222; border: 1px solid #00ffff; padding: 2px 6px; border-radius: 4px; color: #00ffff; font-family: monospace; font-weight: bold; font-size: 12px; }
        .btn-delete { background: #ff3333; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-delete:hover { background: #cc0000; }
        
        .text-gain { color: #00ff00 !important; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header-actions">
            <h1>Espace Partenaires</h1>
            <!-- CORRECTION ICI : Le lien pointe maintenant vers le bon fichier -->
            <a href="add-partenaire.html" class="btn-nav"><i class="fas fa-plus"></i> Nouveau Créateur</a>
        </div>
        
        <!-- Espace Performances -->
        <h2>Performances des Codes</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Utilisations</th>
                        <th>Total Ventes</th>
                        <th>Gains Estimés</th>
                    </tr>
                </thead>
                <tbody id="performance-list">
                    <!-- Calculé dynamiquement -->
                </tbody>
            </table>
        </div>
        
        <!-- Liste de gestion -->
        <h2>Gestion des Partenaires</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Partenaire</th>
                        <th>Code</th>
                        <th>Commission</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="creators-list">
                    <!-- Liste de gestion -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function chargerDonnees() {
            const tbodyCreators = document.getElementById('creators-list');
            const tbodyPerf = document.getElementById('performance-list');
            
            tbodyCreators.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #aaa; padding: 20px;">Chargement...</td></tr>';
            tbodyPerf.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #aaa; padding: 20px;">Calcul des performances...</td></tr>';
            
            try {
                const { data: creators, error: errC } = await supabase.from('creators').select('*').order('created_at', { ascending: false });
                const { data: orders, error: errO } = await supabase.from('orders').select('*');
                
                if (errC) throw errC;
                
                tbodyCreators.innerHTML = '';
                tbodyPerf.innerHTML = '';
                
                if (!creators || creators.length === 0) {
                    tbodyCreators.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #666; padding: 20px;">Aucun partenaire enregistré</td></tr>';
                    tbodyPerf.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #666; padding: 20px;">Aucune donnée disponible</td></tr>';
                    return;
                }
                
                creators.forEach(creator => {
                    const matchingOrders = (orders || []).filter(o => o.creator_code && o.creator_code.toUpperCase() === creator.code.toUpperCase());
                    
                    const count = matchingOrders.length;
                    const totalSales = matchingOrders.reduce((sum, o) => sum + (parseFloat(o.price) || 0), 0);
                    const gains = totalSales * creator.commission_rate;
                    
                    // Ligne Gestion
                    const trC = document.createElement('tr');
                    trC.innerHTML = `
                        <td><span class="creator-icon">${creator.icon || '👤'}</span>${creator.name}</td>
                        <td><span class="badge-code">${creator.code}</span></td>
                        <td>${(creator.commission_rate * 100).toFixed(0)}%</td>
                        <td><button type="button" class="btn-delete" onclick="supprimerPartenaire('${creator.id}')">Supprimer</button></td>
                    `;
                    tbodyCreators.appendChild(trC);
                    
                    // Ligne Performance
                    const trP = document.createElement('tr');
                    trP.innerHTML = `
                        <td><span class="badge-code">${creator.code}</span></td>
                        <td>${count}</td>
                        <td>${totalSales.toFixed(2)} €</td>
                        <td class="text-gain">${gains.toFixed(2)} €</td>
                    `;
                    tbodyPerf.appendChild(trP);
                });
                
            } catch (err) {
                console.error(err);
                tbodyCreators.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ff3333; padding: 20px;">Erreur base de données</td></tr>';
                tbodyPerf.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ff3333; padding: 20px;">Erreur de calcul</td></tr>';
            }
        }

        async function supprimerPartenaire(id) {
            if (confirm("Voulez-vous vraiment supprimer ce partenaire ?")) {
                try {
                    const { error } = await supabase.from('creators').delete().eq('id', id);
                    if (error) throw error;
                    chargerDonnees();
                } catch (err) {
                    alert("Erreur : " + err.message);
                }
            }
        }

        window.onload = chargerDonnees;
    </script>
</body>
</html>
