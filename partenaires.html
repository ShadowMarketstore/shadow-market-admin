<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Espace Partenaires</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: #111116;
            --crimson-neon: #ff0055;
            --cyan-neon: #00ffcc;
            --text-color: #ffffff;
            --text-muted: #888899;
            --border-color: #22222b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* En-tête */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        .header h1 span {
            color: var(--crimson-neon);
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            color: #fff;
            border-color: var(--text-muted);
        }

        /* Sections / Panneaux */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .panel-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: var(--cyan-neon);
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.2);
        }

        /* Formulaire */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-control, select {
            width: 100%;
            background: #050507;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-control:focus, select:focus {
            border-color: var(--crimson-neon);
        }

        .code-input-container {
            display: flex;
            gap: 10px;
        }

        .btn-generator {
            background: var(--cyan-neon);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s ease;
        }

        .btn-generator:hover {
            opacity: 0.9;
        }

        .btn-submit {
            width: 100%;
            background: transparent;
            border: 2px solid var(--crimson-neon);
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: inset 0 0 0 0 var(--crimson-neon);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: var(--crimson-neon);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        /* Tableaux */
        .table-container {
            overflow-x: auto;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid #16161f;
            color: #e2e2e9;
        }

        code {
            background: #1c1c24;
            padding: 3px 6px;
            border-radius: 4px;
            color: var(--cyan-neon);
            font-family: monospace;
        }

        .action-cell {
            text-align: right;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .btn-delete:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- En-tête -->
        <div class="header">
            <h1>Shadow<span>Market</span></h1>
            <a href="index.html" class="btn-back">← Retour</a>
        </div>

        <!-- Section 1 : Ajouter un créateur -->
        <div class="panel">
            <div class="panel-title">Ajouter un créateur</div>
            <form id="partner-form">
                <div class="form-group">
                    <label for="partner-icon">Icône de repérage</label>
                    <select id="partner-icon">
                        <option value="🔥">🔥 Feu</option>
                        <option value="⚡">⚡ Éclair</option>
                        <option value="💎">💎 Diamant</option>
                        <option value="👑">👑 Couronne</option>
                        <option value="🎯">🎯 Cible</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="partner-name">Nom du partenaire</label>
                    <input type="text" id="partner-name" class="form-control" placeholder="Ex: Alex Gaming" required>
                </div>

                <div class="form-group">
                    <label for="partner-code">Code créateur</label>
                    <div class="code-input-container">
                        <input type="text" id="partner-code" class="form-control" placeholder="Ex: ALEX10" required>
                        <button type="button" class="btn-generator" id="btn-generate">Générer</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="partner-commission">Commission / Remise (%)</label>
                    <input type="number" id="partner-commission" class="form-control" placeholder="Ex: 15" min="0" max="100" required>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit-text">Enregistrer le partenaire</button>
            </form>
        </div>

        <!-- Section 2 : Performances des codes -->
        <div class="panel">
            <div class="panel-title">Performances des codes</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Utilisations</th>
                            <th>Total Ventes</th>
                            <th>Gains</th>
                        </tr>
                    </thead>
                    <tbody id="table-performances-body">
                        <!-- Généré par JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Section 3 : Gestion des partenaires -->
        <div class="panel">
            <div class="panel-title">Gestion des partenaires</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Partenaire</th>
                            <th>Code</th>
                            <th>Commission</th>
                            <th class="action-cell">Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-gestion-body">
                        <!-- Généré par JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // --- CONFIGURATION SUPABASE INITIALISÉE ---
        const SUPABASE_URL = "https://jsuvimxjmjiljntmgbzu.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- ÉLÉMENTS DOM ---
        const partnerForm = document.getElementById('partner-form');
        const partnerIcon = document.getElementById('partner-icon');
        const partnerName = document.getElementById('partner-name');
        const partnerCode = document.getElementById('partner-code');
        const partnerCommission = document.getElementById('partner-commission');
        const btnGenerate = document.getElementById('btn-generate');
        const btnSubmitText = document.getElementById('btn-submit-text');
        
        const tablePerformances = document.getElementById('table-performances-body');
        const tableGestion = document.getElementById('table-gestion-body');

        // --- FONCTION : GÉNÉRER UN CODE CRÉATEUR ---
        btnGenerate.addEventListener('click', () => {
            const name = partnerName.value.trim();
            if (!name) {
                alert("Veuillez d'abord entrer le nom du partenaire pour générer un code.");
                return;
            }
            const cleanName = name.replace(/[^a-zA-Z0-9]/g, '').substring(0, 5).toUpperCase();
            const randomNum = Math.floor(10 + Math.random() * 90);
            partnerCode.value = `${cleanName}${randomNum}`;
        });

        // --- FONCTION : CHARGER ET AFFICHER LES PARTENAIRES ---
        async function loadPartners() {
            try {
                const { data: creators, error } = await supabase
                    .from('creators')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error("Erreur lors de la lecture Supabase :", error);
                    return;
                }

                tablePerformances.innerHTML = '';
                tableGestion.innerHTML = '';

                if (!creators || creators.length === 0) {
                    const emptyRow = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:20px;">Aucun partenaire trouvé.</td></tr>`;
                    tablePerformances.innerHTML = emptyRow;
                    tableGestion.innerHTML = emptyRow;
                    return;
                }

                creators.forEach(creator => {
                    const displayPercent = creator.commission_rate ? `${Math.round(creator.commission_rate * 100)}%` : '0%';

                    // Remplissage Tableau 1 : Performances des codes
                    const rowPerf = document.createElement('tr');
                    rowPerf.innerHTML = `
                        <td><code>${creator.code}</code></td>
                        <td>0</td>
                        <td>0.00 €</td>
                        <td style="color: var(--cyan-neon); font-weight: bold;">0.00 €</td>
                    `;
                    tablePerformances.appendChild(rowPerf);

                    // Remplissage Tableau 2 : Gestion des partenaires
                    const rowGestion = document.createElement('tr');
                    rowGestion.innerHTML = `
                        <td>${creator.icon || '🔥'} ${creator.name}</td>
                        <td><code>${creator.code}</code></td>
                        <td>${displayPercent}</td>
                        <td class="action-cell">
                            <button class="btn-delete" onclick="deletePartner('${creator.id}')">❌</button>
                        </td>
                    `;
                    tableGestion.appendChild(rowGestion);
                });

            } catch (err) {
                console.error("Erreur système lors du chargement :", err);
            }
        }

        // --- FONCTION : AJOUTER UN PARTENAIRE (SOUMISSION FORMULAIRE) ---
        partnerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btnSubmitText.disabled = true;
            btnSubmitText.innerText = "Enregistrement...";

            const iconValue = partnerIcon.value;
            const nameValue = partnerName.value.trim();
            const codeValue = partnerCode.value.trim();
            const commissionValue = parseFloat(partnerCommission.value) / 100;

            try {
                const { error } = await supabase
                    .from('creators')
                    .insert([
                        { 
                            name: nameValue, 
                            code: codeValue, 
                            icon: iconValue, 
                            commission_rate: commissionValue 
                        }
                    ]);

                if (error) {
                    alert(`Erreur Supabase : ${error.message}`);
                } else {
                    alert("Partenaire enregistré avec succès !");
                    partnerForm.reset();
                    loadPartners(); 
                }
            } catch (err) {
                console.error("Erreur lors de l'envoi :", err);
            } finally {
                btnSubmitText.disabled = false;
                btnSubmitText.innerText = "Enregistrer le partenaire";
            }
        });

        // --- FONCTION : SUPPRIMER UN PARTENAIRE ---
        window.deletePartner = async function(id) {
            if (confirm("Voulez-vous vraiment supprimer ce partenaire de la base ?")) {
                const { error } = await supabase
                    .from('creators')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert("Erreur lors de la suppression.");
                } else {
                    loadPartners();
                }
            }
        };

        document.addEventListener('DOMContentLoaded', loadPartners);
    </script>
</body>
</html>
