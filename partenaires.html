<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Admin Partenaires</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        h1, h2 { color: #00ffff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px #00ffff; margin-top: 30px; }
        
        .admin-container { max-width: 800px; margin: 0 auto; }
        
        /* Formulaire de création */
        .form-createur { background: #111; border: 2px solid #00ffff; padding: 20px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        
        label { font-size: 14px; margin-bottom: 5px; color: #b0b0b0; font-weight: bold; }
        input, select { background: #222; border: 1px solid #333; padding: 10px; border-radius: 5px; color: white; font-size: 16px; outline: none; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { border-color: #00ffff; }
        
        .form-row-flex { display: flex; gap: 10px; width: 100%; box-sizing: border-box; }
        .form-row-flex input { flex: 1; min-width: 0; }
        
        .btn-submit { background: #00ffff; color: black; border: none; padding: 12px 20px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn-submit:hover { background: #00cccc; box-shadow: 0 0 10px #00ffff; }
        
        .btn-action { background: #00ffff; color: black; border: none; padding: 0 15px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-action:hover { background: #00cccc; box-shadow: 0 0 8px #00ffff; }

        /* Tableaux */
        .table-container { background: #111; border: 1px solid #333; border-radius: 10px; overflow: hidden; margin-top: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #00ffff; color: black; padding: 15px; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 15px; }
        tr:hover { background: #161616; }
        
        .creator-icon { font-size: 20px; margin-right: 8px; vertical-align: middle; }
        .badge-code { background: #222; border: 1px solid #00ffff; padding: 4px 8px; border-radius: 4px; color: #00ffff; font-family: monospace; font-weight: bold; }
        .btn-delete { background: #ff3333; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete:hover { background: #cc0000; }
        
        .text-gain { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>Gestion des Partenaires</h1>
        
        <!-- Formulaire d'ajout -->
        <div class="form-createur">
            <h2>Ajouter un Créateur</h2>
            
            <div class="form-group">
                <label for="c-icon">Icône de repérage</label>
                <select id="c-icon">
                    <option value="🔥">🔥 Feu</option>
                    <option value="⚡">⚡ Éclair</option>
                    <option value="👑">👑 Couronne</option>
                    <option value="💎">💎 Diamant</option>
                    <option value="🎯">🎯 Cible</option>
                    <option value="🚀">🚀 Fusée</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="c-name">Nom du Partenaire</label>
                <input type="text" id="c-name" placeholder="Ex: Alex Gaming">
            </div>
            
            <div class="form-group">
                <label for="c-code">Code Créateur</label>
                <div class="form-row-flex">
                    <input type="text" id="c-code" placeholder="Ex: ALEX10">
                    <button type="button" class="btn-action" onclick="genererCodeAleatoire()">Générer</button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="c-rate">Remise (%)</label>
                <input type="number" id="c-rate" placeholder="Ex: 10" min="0" max="100">
            </div>
            
            <button type="button" class="btn-submit" onclick="creerPartenaire()">Enregistrer le Partenaire</button>
        </div>
        
        <!-- Espace Performances -->
        <h2>Performances des Codes</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Utilisations</th>
                        <th>Total Commandes</th>
                        <th>Gains Estimés</th>
                    </tr>
                </thead>
                <tbody id="performance-list">
                    <!-- Calculé dynamiquement -->
                </tbody>
            </table>
        </div>
        
        <!-- Liste de gestion -->
        <h2>Partenaires Actuels</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Partenaire</th>
                        <th>Code</th>
                        <th>Remise</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="creators-list">
                    <!-- Liste de gestion -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function genererCodeAleatoire() {
            const prefixe = "SHADOW";
            const caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let suffixe = "";
            for (let i = 0; i < 4; i++) {
                suffixe += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
            }
            document.getElementById('c-code').value = prefixe + suffixe;
        }

        async function chargerDonnees() {
            const tbodyCreators = document.getElementById('creators-list');
            const tbodyPerf = document.getElementById('performance-list');
            
            tbodyCreators.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #aaa;">Chargement...</td></tr>';
            tbodyPerf.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #aaa;">Calcul des stats...</td></tr>';
            
            try {
                // Récupère les créateurs et les commandes
                const { data: creators, error: errC } = await supabase.from('creators').select('*').order('created_at', { ascending: false });
                const { data: orders, error: errO } = await supabase.from('orders').select('*');
                
                if (errC) throw errC;
                
                tbodyCreators.innerHTML = '';
                tbodyPerf.innerHTML = '';
                
                if (!creators || creators.length === 0) {
                    tbodyCreators.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #666;">Aucun partenaire</td></tr>';
                    tbodyPerf.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #666;">Aucune statistique</td></tr>';
                    return;
                }
                
                creators.forEach(creator => {
                    // Filtre les commandes qui possèdent ce code créateur
                    const matchingOrders = (orders || []).filter(o => o.creator_code && o.creator_code.toUpperCase() === creator.code.toUpperCase());
                    
                    const count = matchingOrders.length;
                    const totalSales = matchingOrders.reduce((sum, o) => sum + (parseFloat(o.price) || 0), 0);
                    const gains = totalSales * creator.commission_rate;
                    
                    // Table de gestion
                    const trC = document.createElement('tr');
                    trC.innerHTML = `
                        <td><span class="creator-icon">${creator.icon || '👤'}</span>${creator.name}</td>
                        <td><span class="badge-code">${creator.code}</span></td>
                        <td>${(creator.commission_rate * 100).toFixed(0)}%</td>
                        <td><button type="button" class="btn-delete" onclick="supprimerPartenaire('${creator.id}')">Supprimer</button></td>
                    `;
                    tbodyCreators.appendChild(trC);
                    
                    // Table des performances
                    const trP = document.createElement('tr');
                    trP.innerHTML = `
                        <td><span class="badge-code">${creator.code}</span></td>
                        <td>${count}</td>
                        <td>${totalSales.toFixed(2)} €</td>
                        <td class="text-gain">${gains.toFixed(2)} €</td>
                    `;
                    tbodyPerf.appendChild(trP);
                });
                
            } catch (err) {
                console.error(err);
                tbodyCreators.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ff3333;">Erreur</td></tr>';
            }
        }

        async function creerPartenaire() {
            try {
                const icon = document.getElementById('c-icon').value;
                const name = document.getElementById('c-name').value.trim();
                const code = document.getElementById('c-code').value.trim().toUpperCase();
                const rateValue = document.getElementById('c-rate').value;

                if (!name || !code || !rateValue) {
                    alert("Veuillez remplir tous les champs !");
                    return;
                }

                const commission_rate = parseFloat(rateValue) / 100;

                const { error } = await supabase
                    .from('creators')
                    .insert([{ icon, name, code, commission_rate }]);

                if (error) throw error;

                alert("Partenaire ajouté avec succès !");
                
                document.getElementById('c-name').value = '';
                document.getElementById('c-code').value = '';
                document.getElementById('c-rate').value = '';
                
                chargerDonnees();

            } catch (err) {
                alert("Erreur : " + (err.message || err));
            }
        }

        async function supprimerPartenaire(id) {
            if (confirm("Voulez-vous vraiment supprimer ce partenaire ?")) {
                try {
                    const { error } = await supabase.from('creators').delete().eq('id', id);
                    if (error) throw error;
                    chargerDonnees();
                } catch (err) {
                    alert("Erreur : " + err.message);
                }
            }
        }

        window.onload = chargerDonnees;
    </script>
</body>
</html>
