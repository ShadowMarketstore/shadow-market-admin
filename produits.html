<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Produits</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; padding: 0; margin: 0; }
        h1 { color: #00ffff; padding: 20px 20px 10px 20px; margin: 0; font-size: 22px; border-bottom: 2px solid #00ffff; }

        /* Conteneur principal */
        .wrapper { width: 100%; padding: 20px; box-sizing: border-box; }

        /* Le Tableau - Structure fixe */
        .my-table {
            display: grid;
            grid-template-columns: 80px 1fr 70px;
            width: 100%;
            border: 2px solid #333; /* Bordure extérieure épaisse */
        }

        /* Les cellules du tableau */
        .cell {
            padding: 15px 10px;
            border-bottom: 1px solid #333;
            border-right: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }

        /* En-têtes */
        .header {
            background-color: #1a1a1a;
            font-weight: bold;
            color: #00ffff;
            text-transform: uppercase;
        }

        /* Styles produits */
        .product-img { width: 60px; height: 40px; background: #333; border-radius: 4px; object-fit: cover; }
        .sales { color: #ffffff; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Mes Produits</h1>

    <div class="wrapper">
        <div class="my-table" id="table">
            <div class="cell header">Image</div>
            <div class="cell header">NOM PRODUCT</div>
            <div class="cell header">Ventes</div>

            <div id="product-container" style="display: contents;">
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://jsuvimxjmjiljntmgbzu.supabase.co', 
            'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
        );

        async function loadData() {
            const { data } = await supabase.from('products').select('*');
            const container = document.getElementById('product-container');

            if (data && data.length > 0) {
                container.innerHTML = data.map(p => `
                    <div class="cell"><img src="${p.image_url || ''}" class="product-img"></div>
                    <div class="cell" style="justify-content: flex-start;">${p.name || p.nom || 'Sans nom'}</div>
                    <div class="cell sales">${p.sales_count || p.ventes || 0}</div>
                `).join('');
            } else {
                // Lignes vides pour remplir le tableau si pas de produit
                container.innerHTML = `
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
                `;
            }
        }
        loadData();
    </script>
</body>
</html>
