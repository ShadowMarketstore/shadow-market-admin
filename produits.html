<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Produits</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        h1 { color: #00ffff; border-bottom: 2px solid #00ffff; padding-bottom: 10px; font-size: 22px; }
        
        /* Conteneur avec scroll (pour tout voir) */
        .scroll-container { width: 100%; overflow-y: auto; max-height: 70vh; border: 1px solid #333; }
        
        .product-table { 
            display: grid; 
            grid-template-columns: 100px 1fr 70px; /* Plus large */
            width: 100%;
        }
        .cell { 
            padding: 15px 10px; /* Plus d'espace */
            border-bottom: 1px solid #333; 
            border-right: 1px solid #333; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-height: 50px; /* Hauteur minimale pour bien voir */
        }
        .header-cell { font-weight: bold; color: #b0b0b0; background: #111; position: sticky; top: 0; }
        
        .product-img { width: 80px; height: 50px; background: #333; border-radius: 4px; object-fit: cover; }
        .sales-val { color: #00ffff; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <h1>Mes Produits</h1>
    
    <div class="scroll-container">
        <div class="product-table">
            <div class="cell header-cell">Image</div>
            <div class="cell header-cell">NOM PRODUCT</div>
            <div class="cell header-cell">Ventes</div>

            <div id="product-container" style="display: contents;">
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://jsuvimxjmjiljntmgbzu.supabase.co', 
            'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
        );

        async function fetchProducts() {
            const { data } = await supabase.from('products').select('*');
            const container = document.getElementById('product-container');
            
            if (data && data.length > 0) {
                container.innerHTML = data.map(p => `
                    <div class="cell"><img src="${p.image_url || ''}" class="product-img"></div>
                    <div class="cell" style="justify-content: flex-start; font-size: 16px;">${p.name || p.nom || 'Produit'}</div>
                    <div class="cell sales-val">${p.sales_count || p.ventes || 0}</div>
                `).join('');
            } else {
                container.innerHTML = '<div class="cell" style="grid-column: span 3;">Aucun produit</div>';
            }
        }
        fetchProducts();
    </script>
</body>
</html>
