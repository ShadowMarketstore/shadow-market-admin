<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Stock</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        nav { background: #111; padding: 15px; border-bottom: 1px solid #333; display: flex; gap: 20px; }
        nav a { color: #888; text-decoration: none; }
        h1 { color: #00ffff; padding: 20px; margin: 0; font-size: 20px; }
        
        .wrapper { padding: 10px; }
        .my-table { display: grid; grid-template-columns: 80px 1fr 80px; width: 100%; border: 1px solid #333; }
        .cell { padding: 10px; border-bottom: 1px solid #333; border-right: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .header { background-color: #1a1a1a; font-weight: bold; color: #00ffff; }
        .product-img { width: 50px; height: 30px; background: #333; border-radius: 2px; object-fit: cover; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="produits.html" style="color: #00ffff;">Stock</a>
        <a href="formulaire.html">Ajouter</a>
    </nav>

    <h1>Mes Produits</h1>
    
    <div class="wrapper">
        <div class="my-table">
            <div class="cell header">Image</div>
            <div class="cell header">NOM PRODUCT</div>
            <div class="cell header">Stock</div>

            <div id="product-container" style="display: contents;">
                <div class="cell" style="grid-column: span 3;">Chargement en cours...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://jsuvimxjmjiljntmgbzu.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZimxjbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4'
        );

        async function loadData() {
            const container = document.getElementById('product-container');
            try {
                // IMPORTANT : Ces noms doivent correspondre aux colonnes de ta table dans Supabase
                const { data, error } = await supabase
                    .from('products')
                    .select('name, image_url, stock_quantity');
                
                if (error) throw error;

                if (data && data.length > 0) {
                    container.innerHTML = data.map(p => `
                        <div class="cell"><img src="${p.image_url}" class="product-img" onerror="this.style.display='none'"></div>
                        <div class="cell" style="justify-content: flex-start;">${p.name}</div>
                        <div class="cell">${p.stock_quantity || 0}</div>
                    `).join('');
                } else {
                    container.innerHTML = `<div class="cell" style="grid-column: span 3;">Aucun produit trouvé.</div>`;
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="cell" style="grid-column: span 3; color: red;">Erreur: Vérifie la console.</div>`;
            }
        }
        loadData();
    </script>
</body>
</html>
