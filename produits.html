<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Debug</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; padding: 0; margin: 0; }
        h1 { color: #00ffff; padding: 20px; margin: 0; font-size: 20px; border-bottom: 2px solid #00ffff; }
        
        .wrapper { width: 100%; padding: 10px; box-sizing: border-box; }
        
        /* Grille forcé */
        .my-table {
            display: grid;
            grid-template-columns: 80px 1fr 70px;
            width: 100%;
            border: 1px solid #333;
        }
        
        .cell {
            padding: 12px 5px;
            border-bottom: 1px solid #333;
            border-right: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            font-size: 13px;
        }
        
        .header { background-color: #1a1a1a; font-weight: bold; color: #00ffff; }
        .product-img { width: 50px; height: 30px; background: #333; border-radius: 2px; }
    </style>
</head>
<body>
    <h1>Mes Produits</h1>
    <div class="wrapper">
        <div class="my-table">
            <div class="cell header">Image</div>
            <div class="cell header">NOM PRODUCT</div>
            <div class="cell header">Ventes</div>

            <div id="product-container" style="display: contents;">
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://jsuvimxjmjiljntmgbzu.supabase.co', 
            'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
        );

        async function loadData() {
            const container = document.getElementById('product-container');
            
            // 1. Essayer de récupérer les données
            const { data, error } = await supabase.from('products').select('*');
            
            if (error) {
                container.innerHTML = `<div class="cell" style="grid-column: span 3; color: red;">Erreur: ${error.message}</div>`;
                return;
            }

            if (data && data.length > 0) {
                container.innerHTML = data.map(p => `
                    <div class="cell"><img src="${p.image_url || ''}" class="product-img"></div>
                    <div class="cell" style="justify-content: flex-start;">${p.name || 'Produit test'}</div>
                    <div class="cell">${p.sales_count || 0}</div>
                `).join('');
            } else {
                // 2. Lignes de test si la base est vide
                container.innerHTML = `
                    <div class="cell"><div class="product-img"></div></div><div class="cell">Produit Exemple 1</div><div class="cell">5</div>
                    <div class="cell"><div class="product-img"></div></div><div class="cell">Produit Exemple 2</div><div class="cell">12</div>
                `;
            }
        }
        loadData();
    </script>
</body>
</html>
