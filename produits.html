<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Mes Produits</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        nav { background: #111; padding: 15px; border-bottom: 1px solid #333; display: flex; gap: 20px; }
        nav a { color: #888; text-decoration: none; }
        h1 { color: #00ffff; padding: 20px; margin: 0; font-size: 20px; }
        
        .table-container { width: 100%; max-height: 70vh; overflow-y: auto; border-top: 1px solid #333; }
        .grid-header, .grid-row {
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .grid-header { background: #111; padding: 10px; color: #00ffff; font-weight: bold; }
        .grid-row { padding: 10px; }
        .img-cell { width: 50px; height: 50px; background: #222; border-radius: 4px; object-fit: cover; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="produits.html" style="color: #00ffff;">Stock</a>
        <a href="formulaire.html">Ajouter</a>
    </nav>

    <h1>Mes Produits</h1>

    <div class="table-container">
        <div class="grid-header">
            <div>Image</div>
            <div>NOM PRODUCT</div>
            <div>Stock</div>
        </div>
        <div id="product-list">
            <div style="padding: 20px;">Chargement...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://jsuvimxjmjiljntmgbzu.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZimxjbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4'
        );

        async function fetchProducts() {
            const list = document.getElementById('product-list');
            try {
                // Utilisation des colonnes réelles : name, image_url, stock_quantity
                // Tri par stock décroissant (les plus en stock en haut)
                const { data, error } = await supabase
                    .from('products')
                    .select('name, image_url, stock_quantity')
                    .order('stock_quantity', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    list.innerHTML = '<div style="padding: 20px;">Aucun produit trouvé.</div>';
                    return;
                }

                list.innerHTML = data.map(p => `
                    <div class="grid-row">
                        <div><img src="${p.image_url || ''}" class="img-cell" onerror="this.style.display='none'"></div>
                        <div>${p.name}</div>
                        <div>${p.stock_quantity || 0}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Erreur:", err);
                list.innerHTML = '<div style="padding: 20px; color: red;">Erreur de connexion base.</div>';
            }
        }

        fetchProducts();
    </script>
</body>
</html>
