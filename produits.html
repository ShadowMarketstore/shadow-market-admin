<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Stock</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .grid-row { display: grid; grid-template-columns: 80px 1fr 80px; border-bottom: 1px solid #333; padding: 10px; align-items: center; }
        .img-cell { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        #debug-log { padding: 20px; font-family: monospace; color: #ff0; border: 1px solid #ff0; margin: 10px; }
    </style>
</head>
<body>

    <h1>Stock</h1>
    <div id="product-list">Chargement des produits...</div>
    <div id="debug-log"></div>

    <script>
        // 1. Définition des constantes
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZimxjbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4';
        
        const debug = document.getElementById('debug-log');
        function log(msg) { debug.innerHTML += `<div>> ${msg}</div>`; }

        async function init() {
            try {
                // 2. Vérification que supabase est chargé
                if (typeof supabase === 'undefined' || !supabase.createClient) {
                    throw new Error("La bibliothèque Supabase n'est pas chargée.");
                }
                log("Supabase chargé.");

                // 3. Initialisation du client
                const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                log("Client initialisé.");

                // 4. Récupération des données
                log("Récupération des données...");
                const { data, error } = await sbClient
                    .from('products')
                    .select('name, image_url, sales_count');

                if (error) throw error;

                log("Données reçues !");
                const list = document.getElementById('product-list');
                list.innerHTML = data.map(p => `
                    <div class="grid-row">
                        <div><img src="${p.image_url || ''}" class="img-cell" onerror="this.style.display='none'"></div>
                        <div>${p.name || 'Produit'}</div>
                        <div>${p.sales_count ?? 0}</div>
                    </div>
                `).join('');
                
                debug.style.display = 'none';

            } catch (err) {
                log("ERREUR : " + err.message);
                console.error(err);
            }
        }

        // 5. Lancement
        window.addEventListener('load', init);
    </script>
</body>
</html>
