<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Administration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #0ff; --bg-color: #000; }
        body { background: var(--bg-color); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-color); padding-bottom: 10px; margin-bottom: 20px; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { border: 1px solid var(--main-color); padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--main-color); }
        .order-card { background: #151515; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .star { color: #f1c40f; font-size: 24px; cursor: pointer; }
        .del-btn { color: red; cursor: pointer; text-align: center; font-size: 20px; margin-left: auto; }
        .del-label { font-size: 9px; color: #666; display: block; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); padding: 20px; z-index: 1000; }
        .modal-content { background: #111; padding: 25px; border-radius: 12px; border: 1px solid var(--main-color); max-width: 450px; margin: 50px auto; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard Admin</h1>
        <a href="index.html" style="color:var(--main-color); text-decoration:none;"><i class="fas fa-home"></i> Retour Accueil</a>
    </div>

    <div class="stats-container">
        <div class="stat-card">Total<br><div id="total" class="stat-value">0</div></div>
        <div class="stat-card">Traités<br><div id="traite" class="stat-value">0</div></div>
    </div>

    <div id="order-list"></div>

    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="color:var(--main-color)">Détails</h2>
            <div id="modal-body" style="font-size:16px; line-height:1.8;"></div>
            <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; padding:10px; margin-top:20px; cursor:pointer;">Fermer</button>
        </div>
    </div>

    <script>
        const db = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

        async function loadData() {
            const { data } = await db.from('orders').select('*').order('created_at', { ascending: false });
            document.getElementById('total').innerText = data.length;
            document.getElementById('traite').innerText = data.filter(o => o.status === 'terminée').length;
            
            document.getElementById('order-list').innerHTML = data.map(o => `
                <div class="order-card" onclick="showDetails('${o.id}')">
                    <i class="far fa-star star" onclick="event.stopPropagation(); this.classList.toggle('fas')"></i>
                    <div style="flex-grow:1">
                        <strong>${o.customer_email}</strong><br>
                        <small>${o.modele || 'N/A'} | RAM: ${o.ram || '?'}Go</small>
                    </div>
                    <div class="del-btn" onclick="event.stopPropagation(); deleteOrder('${o.id}')">
                        <i class="fas fa-trash"></i>
                        <span class="del-label">Suppression Réelle</span>
                    </div>
                </div>
            `).join('');
        }

        async function showDetails(id) {
            const { data } = await db.from('orders').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('modal-title').innerText = "Détails de la commande";
                document.getElementById('modal-body').innerHTML = Object.entries(data)
                    .map(([key, val]) => `<p><strong>${key.toUpperCase()}:</strong> ${val || 'N/A'}</p>`)
                    .join('');
                document.getElementById('modal').style.display = 'block';
            }
        }

        async function deleteOrder(id) {
            if(confirm('Suppression définitive de la base ?')) {
                await db.from('orders').delete().eq('id', id);
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
