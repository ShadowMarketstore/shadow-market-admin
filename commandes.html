<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #0ff; --bg-color: #000; }
        body { background: var(--bg-color); color: #fff; font-family: sans-serif; padding: 20px; }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--main-color); }
        .order-card { background: #151515; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
        .del-btn { color: red; cursor: pointer; text-align: center; margin-left: auto; }
    </style>
</head>
<body>
    <h1>Dashboard Admin</h1>
    <div class="stats-container" style="display:flex; gap:20px; margin-bottom:30px;">
        <div class="stat-card" style="border:1px solid #0ff; padding:20px; border-radius:12px; flex:1; text-align:center;">
            Total Historique<br><div id="total-historique" class="stat-value">0</div>
        </div>
        <div class="stat-card" style="border:1px solid #0ff; padding:20px; border-radius:12px; flex:1; text-align:center;">
            Actuellement Traités<br><div id="traite-actuel" class="stat-value">0</div>
        </div>
    </div>

    <div id="order-list"></div>

    <script>
        const db = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

        async function loadData() {
            // 1. Charger les commandes actives
            const { data: orders } = await db.from('orders').select('*');
            
            // 2. Récupérer le total historique depuis une table nommée 'stats' (ou une logique fixe)
            // Pour l'instant, on simule la lecture d'une valeur fixe
            const { data: stats } = await db.from('stats').select('total_count').single();
            
            document.getElementById('total-historique').innerText = stats ? stats.total_count : orders.length;
            document.getElementById('traite-actuel').innerText = orders.filter(o => o.status === 'terminée').length;

            document.getElementById('order-list').innerHTML = orders.map(o => `
                <div class="order-card">
                    <i class="${o.status === 'terminée' ? 'fas' : 'far'} fa-star" style="color:#f1c40f; cursor:pointer;" onclick="toggleStatus('${o.id}', '${o.status}')"></i>
                    <div style="flex-grow:1">${o.customer_email}</div>
                    <div class="del-btn" onclick="deleteOrder('${o.id}')">
                        <i class="fas fa-trash"></i><br><span style="font-size:9px;">Suppression Réelle</span>
                    </div>
                </div>
            `).join('');
        }

        async function deleteOrder(id) {
            if(confirm('Supprimer définitivement de la base ?')) {
                // IMPORTANT : Si cela échoue, c'est que tes politiques RLS sur Supabase bloquent le DELETE
                const { error } = await db.from('orders').delete().eq('id', id);
                if(error) {
                    alert("Erreur: " + error.message + ". Vérifie tes politiques RLS dans Supabase.");
                } else {
                    loadData();
                }
            }
        }

        async function toggleStatus(id, currentStatus) {
            const newStatus = (currentStatus === 'terminée') ? 'en attente' : 'terminée';
            await db.from('orders').update({ status: newStatus }).eq('id', id);
            loadData();
        }

        loadData();
    </script>
</body>
</html>
