<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-card { border: 1px solid #0ff; padding: 15px; border-radius: 8px; flex: 1; text-align: center; }
        .order-card { border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #111; position: relative; }
        .delete-btn { position: absolute; top: 10px; right: 10px; color: #ff4444; cursor: pointer; font-size: 18px; }
        .status-pill { padding: 4px 8px; border-radius: 4px; font-size: 12px; background: #222; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" style="color:#0ff; text-decoration:none;">🏠 Retour Accueil</a>
    </nav>

    <h1>Admin Dashboard</h1>
    
    <div class="stats">
        <div class="stat-card">Total: <span id="total">0</span></div>
        <div class="stat-card">En attente: <span id="pending">0</span></div>
    </div>

    <div id="order-list">Chargement...</div>

    <script>
        const supabase = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

        async function fetchOrders() {
            const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
            if (error) return alert("Erreur : " + error.message);

            document.getElementById('total').innerText = data.length;
            document.getElementById('pending').innerText = data.filter(o => o.status === 'en attente').length;

            document.getElementById('order-list').innerHTML = data.map(o => `
                <div class="order-card">
                    <i class="fas fa-trash delete-btn" onclick="deleteOrder('${o.id}')"></i>
                    <strong>${o.customer_email}</strong><br>
                    <small>${o.modele} | ${o.ram}Go RAM</small>
                    <p>${o.message || 'Pas de message'}</p>
                    <span class="status-pill">${o.status}</span>
                </div>
            `).join('');
        }

        async function deleteOrder(id) {
            if(confirm("Supprimer cette commande définitivement ?")) {
                const { error } = await supabase.from('orders').delete().eq('id', id);
                if (error) alert("Erreur : " + error.message);
                else fetchOrders();
            }
        }

        fetchOrders();
    </script>
</body>
</html>
