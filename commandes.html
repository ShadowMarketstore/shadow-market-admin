<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { border: 1px solid #0ff; padding: 15px; border-radius: 8px; flex: 1; text-align: center; }
        .order-card { border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #111; }
    </style>
</head>
<body>
    <h1>Dashboard Admin</h1>
    <div class="stats">
        <div class="stat-card">Total: <span id="total">0</span></div>
        <div class="stat-card">Traités: <span id="traite">0</span></div>
    </div>
    <div id="debug-log" style="color: yellow; font-size: 12px; margin-bottom: 10px;"></div>
    <div id="list">Chargement...</div>

    <script>
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const debug = document.getElementById('debug-log');

        async function init() {
            try {
                debug.innerText = "Connexion à Supabase...";
                const { data, error } = await supabase.from('orders').select('*');
                
                if (error) {
                    debug.innerText = "ERREUR API: " + error.message;
                    return;
                }

                debug.innerText = "Données reçues : " + (data ? data.length : 0) + " commandes.";
                
                // Mettre à jour les compteurs
                document.getElementById('total').innerText = data.length;
                document.getElementById('traite').innerText = data.filter(o => o.status === 'terminée').length;

                // Afficher la liste
                document.getElementById('list').innerHTML = data.map(o => `
                    <div class="order-card">
                        <strong>${o.customer_email}</strong><br>
                        Modèle: ${o.modele} | Statut: ${o.status}
                    </div>
                `).join('');

            } catch (e) {
                debug.innerText = "ERREUR CRITIQUE: " + e.message;
            }
        }
        init();
    </script>
</body>
</html>
