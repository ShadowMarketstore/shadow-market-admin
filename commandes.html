<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { border: 1px solid #0ff; padding: 15px; border-radius: 8px; flex: 1; text-align: center; }
        #debug { color: yellow; margin-bottom: 10px; font-size: 14px; border: 1px solid yellow; padding: 5px; }
        .order-card { border: 1px solid #333; padding: 10px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <div class="stats">
        <div class="stat-card">Total: <span id="total">0</span></div>
        <div class="stat-card">Traités: <span id="traite">0</span></div>
    </div>
    <div id="debug">Démarrage du script...</div>
    <div id="list"></div>

    <script>
        // 1. Initialisation forcée
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const debug = document.getElementById('debug');

        // 2. Fonction de chargement robuste
        async function loadData() {
            try {
                debug.innerText = "Tentative de connexion...";
                const { data, error } = await supabase.from('orders').select('*');
                
                if (error) {
                    debug.innerText = "ERREUR: " + error.message;
                    return;
                }
                
                debug.innerText = "Succès ! Commandes trouvées : " + data.length;
                
                if (data && data.length > 0) {
                    document.getElementById('total').innerText = data.length;
                    document.getElementById('traite').innerText = data.filter(o => o.status === 'terminée').length;
                    
                    document.getElementById('list').innerHTML = data.map(o => `
                        <div class="order-card">Email: ${o.customer_email || 'N/A'}</div>
                    `).join('');
                }
            } catch (e) {
                debug.innerText = "CATCH ERROR: " + e.message;
            }
        }

        // 3. Lancement au chargement complet de la fenêtre
        window.onload = loadData;
    </script>
</body>
</html>
