<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { color: #0ff; text-shadow: 0 0 10px #0ff; border-bottom: 1px solid #0ff; padding-bottom: 10px; }
        
        #stats-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { border: 1px solid #0ff; padding: 15px; border-radius: 8px; flex: 1; text-align: center; background: #0a0a0a; }
        .stat-box p { font-size: 24px; color: #0ff; margin: 10px 0 0 0; }
        
        .order-card { 
            border: 1px solid #0ff; padding: 20px; margin-bottom: 15px; 
            border-radius: 10px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center;
        }
        .star { font-size: 28px; cursor: pointer; color: #444; }
        .star.active { color: #0ff; text-shadow: 0 0 10px #0ff; }
    </style>
</head>
<body>

    <h1>Gestion des Commandes</h1>

    <div id="stats-container">
        <div class="stat-box">
            <h3 style="margin:0;">Reçues</h3>
            <p id="total-count">0</p>
        </div>
        <div class="stat-box">
            <h3 style="margin:0;">Terminées</h3>
            <p id="done-count">0</p>
        </div>
    </div>

    <div id="admin-list">Chargement des commandes...</div>

    <script>
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadOrders() {
            const { data } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('admin-list');
            
            if (!data || data.length === 0) { list.innerHTML = "Aucune commande."; return; }

            list.innerHTML = data.map(cmd => `
                <div class="order-card">
                    <div>
                        <p><strong>Client :</strong> ${cmd.customer_email}</p>
                        <p><strong>Config :</strong> ${cmd.modele} | ${cmd.ram}Go RAM</p>
                        <p><strong>Message :</strong> ${cmd.message}</p>
                    </div>
                    <span class="star" onclick="toggleStar(this)">★</span>
                </div>
            `).join('');
            
            updateCounters();
        }

        function updateCounters() {
            const total = document.querySelectorAll('.order-card').length;
            const done = document.querySelectorAll('.star.active').length;
            document.getElementById('total-count').innerText = total;
            document.getElementById('done-count').innerText = done;
        }

        function toggleStar(element) {
            element.classList.toggle('active');
            updateCounters();
        }

        loadOrders();
    </script>
</body>
</html>
