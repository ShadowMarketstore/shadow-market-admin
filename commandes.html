<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { color: #0ff; text-shadow: 0 0 5px #0ff; }
        .order-card { 
            border: 1px solid #0ff; padding: 15px; margin: 15px 0; 
            border-radius: 8px; background: #0a0a0a; 
        }
        .order-card strong { color: #0ff; }
    </style>
</head>
<body>

    <h1>Commandes reçues</h1>
    <div id="admin-list">Chargement des commandes en attente...</div>

    <script>
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadOrders() {
            // On récupère toutes les commandes triées par date
            const { data, error } = await supabase
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('admin-list').innerHTML = "Erreur de chargement.";
                return;
            }

            const list = document.getElementById('admin-list');
            if (data && data.length > 0) {
                list.innerHTML = data.map(cmd => `
                    <div class="order-card">
                        <p><strong>De :</strong> ${cmd.customer_email}</p>
                        <p><strong>Config :</strong> ${cmd.modele} | RAM: ${cmd.ram}Go | ${cmd.os}</p>
                        <p><strong>Message :</strong> ${cmd.message}</p>
                        <small>Reçu le : ${new Date(cmd.created_at).toLocaleString()}</small>
                    </div>
                `).join('');
            } else {
                list.innerHTML = "Aucune commande pour le moment.";
            }
        }
        loadOrders();
    </script>
</body>
</html>
