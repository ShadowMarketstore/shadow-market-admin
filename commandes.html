<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Administration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #0ff; --bg-color: #000; }
        body { background: var(--bg-color); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-color); padding-bottom: 10px; margin-bottom: 20px; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { border: 1px solid var(--main-color); padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--main-color); }
        .order-list { display: flex; flex-direction: column; gap: 15px; }
        .order-card { background: #151515; border-left: 4px solid var(--main-color); padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .order-info strong { color: var(--main-color); font-size: 1.1em; }
        .order-actions { display: flex; gap: 15px; align-items: center; }
        .btn-action { cursor: pointer; font-size: 20px; transition: 0.3s; }
        .btn-action:hover { transform: scale(1.2); }
        .status-badge { font-size: 12px; padding: 5px 12px; border-radius: 20px; background: #333; text-transform: uppercase; }
        #debug { font-size: 12px; margin-bottom: 10px; padding: 8px; border-radius: 6px; }
        .debug-ok { color: #0f0; }
        .debug-err { color: #f44; background: #1a0000; border: 1px solid #f44; }
        .debug-info { color: yellow; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard Admin</h1>
        <a href="index.html" style="color:var(--main-color); text-decoration:none;"><i class="fas fa-home"></i> Retour Accueil</a>
    </div>

    <div id="debug" class="debug-info">Initialisation...</div>

    <div class="stats-container">
        <div class="stat-card">Total<br><div id="total" class="stat-value">—</div></div>
        <div class="stat-card">Traités<br><div id="traite" class="stat-value">—</div></div>
    </div>

    <div id="order-list" class="order-list">Chargement...</div>

    <script>
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX';

        // ✅ FIX CRITIQUE : variable renommée "db" pour éviter le conflit avec le namespace "supabase"
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const debug = document.getElementById('debug');

        function setDebug(msg, type = 'info') {
            debug.className = 'debug-' + type;
            debug.innerText = msg;
        }

        async function loadData() {
            setDebug('Connexion à Supabase...', 'info');
            try {
                const { data, error } = await db
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                setDebug(`✅ ${data.length} commande(s) chargée(s).`, 'ok');

                document.getElementById('total').innerText = data.length;
                document.getElementById('traite').innerText = data.filter(o => o.status === 'terminée').length;

                const container = document.getElementById('order-list');
                if (data.length === 0) {
                    container.innerHTML = "<p style='color:#888'>Aucune commande enregistrée.</p>";
                    return;
                }

                container.innerHTML = data.map(o => `
                    <div class="order-card">
                        <div class="order-info">
                            <strong>${o.customer_email || 'Email non fourni'}</strong><br>
                            <small>${o.modele || 'N/A'} | RAM: ${o.ram || '?'}Go</small>
                        </div>
                        <div class="order-actions">
                            <span class="status-badge">${o.status || 'inconnu'}</span>
                            <i class="fas fa-check-circle btn-action" style="color:green" title="Marquer terminée" onclick="updateStatus('${o.id}', 'terminée')"></i>
                            <i class="fas fa-trash btn-action" style="color:red" title="Supprimer" onclick="deleteOrder('${o.id}')"></i>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                setDebug('❌ Erreur : ' + err.message, 'err');
                document.getElementById('order-list').innerHTML = `<p style="color:#f44">Impossible de charger les commandes.<br><small>${err.message}</small></p>`;
                document.getElementById('total').innerText = '!';
                document.getElementById('traite').innerText = '!';
            }
        }

        async function updateStatus(id, newStatus) {
            const { error } = await db.from('orders').update({ status: newStatus }).eq('id', id);
            if (error) {
                alert('Erreur mise à jour : ' + error.message);
            } else {
                loadData();
            }
        }

        async function deleteOrder(id) {
            if (confirm('Confirmer la suppression définitive ?')) {
                const { error } = await db.from('orders').delete().eq('id', id);
                if (error) {
                    alert('Erreur suppression : ' + error.message);
                } else {
                    loadData();
                }
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
