<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { color: #0ff; text-shadow: 0 0 10px #0ff; border-bottom: 1px solid #0ff; padding-bottom: 10px; }
        #admin-list { margin-top: 20px; }
        .order-card { 
            border: 1px solid #0ff; padding: 15px; margin-bottom: 15px; 
            border-radius: 10px; background: #0a0a0a;
        }
        .order-card p { margin: 5px 0; font-size: 14px; }
        .debug-error { color: #ff0000; border: 1px solid #ff0000; padding: 10px; }
    </style>
</head>
<body>

    <h1>Gestion des Commandes</h1>
    <div id="admin-list">Chargement des commandes...</div>

    <script>
        const supabase = supabase.createClient(
            'https://jsuvimxjmjiljntmgbzu.supabase.co', 
            'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
        );

        async function loadOrders() {
            const list = document.getElementById('admin-list');
            
            try {
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                if (!data || data.length === 0) {
                    list.innerHTML = "Aucune commande trouvée.";
                    return;
                }

                list.innerHTML = data.map(cmd => `
                    <div class="order-card">
                        <p><strong>Email :</strong> ${cmd.customer_email || 'N/A'}</p>
                        <p><strong>Modèle :</strong> ${cmd.modele || 'N/A'}</p>
                        <p><strong>Config :</strong> ${cmd.ram || '0'}Go RAM | ${cmd.stockage || 'N/A'}</p>
                        <p><strong>Système :</strong> ${cmd.os || 'N/A'} | <strong>GPU :</strong> ${cmd.gpu || 'N/A'}</p>
                        <p><strong>Message :</strong> ${cmd.message || 'Aucun'}</p>
                    </div>
                `).join('');
            
            } catch (err) {
                list.innerHTML = `<div class="debug-error">Erreur : ${err.message}</div>`;
            }
        }

        loadOrders();
    </script>
</body>
</html>
