<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Mes Produits & Ventes</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body { 
            background: #0a0a0a; 
            color: #ffffff; 
            padding: 0; 
            margin: 0; 
            overflow-x: hidden;
        }
        
        /* Barre de navigation */
        .nav-bar { 
            background: #121212; 
            padding: 15px; 
            border-bottom: 1px solid #1f1f1f; 
            display: flex; 
            gap: 20px; 
        }
        .nav-bar a { 
            color: #888; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500;
        }
        .nav-bar a.active {
            color: #00ffff;
        }
        
        .container {
            padding: 20px;
        }

        h1 { 
            color: #ffffff; 
            font-size: 24px;
            margin-bottom: 5px;
        }
        .sub-title {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Liste des produits style épuré */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-item {
            background: #141414;
            border: 1px solid #1f1f1f;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }

        .product-item:hover {
            background: #1c1c1c;
        }

        .product-info-block {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product-img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-color: #222;
            border: 1px solid #2d2d2d;
        }

        .product-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-name {
            font-weight: 600;
            font-size: 15px;
            color: #fff;
        }

        .product-stock {
            font-size: 12px;
            color: #00ffff;
        }

        .product-stock.empty {
            color: #ff4444;
        }

        .sales-badge {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #aaa;
        }

        /* PANNEAU COULISSANT VERTICAL (Bas -> Haut) */
        .sliding-panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
            z-index: 999;
        }

        .sliding-panel {
            position: fixed;
            bottom: -100%; /* Caché en bas au départ */
            left: 0;
            width: 100%;
            background: #161616;
            border-top: 1px solid #2d2d2d;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 24px;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            max-height: 70%;
            overflow-y: auto;
        }

        /* Classes actives pour l'animation */
        .sliding-panel-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .sliding-panel.open {
            bottom: 0; /* Monte jusqu'au bas visible */
        }

        /* Poignée visuelle du menu coulissant */
        .panel-handle {
            width: 40px;
            height: 5px;
            background: #333;
            border-radius: 3px;
            margin: -10px auto 20px auto;
        }

        .panel-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #1f1f1f;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #2d2d2d;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #00ffff;
        }

        .close-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html">Boutique</a>
        <a href="formulaire.html">Ajouter un Article</a>
        <a href="commande.html" class="active">Mes Produits</a>
    </nav>

    <div class="container">
        <h1>Articles de la boutique</h1>
        <div class="sub-title" id="total-count">Chargement des articles...</div>

        <div class="product-list" id="products-container">
            </div>
    </div>

    <div class="sliding-panel-overlay" id="panel-overlay" onclick="closePanel()"></div>

    <div class="sliding-panel" id="details-panel">
        <div class="panel-handle"></div>
        <div class="panel-title" id="panel-product-name">Nom du Produit</div>
        
        <div id="panel-product-img" style="width: 100%; height: 180px; border-radius: 12px; background-size: cover; background-position: center; margin-bottom: 20px; border: 1px solid #2d2d2d;"></div>

        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-label">Quantité en Stock</div>
                <div class="stat-value" id="panel-product-stock">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Ventes</div>
                <div class="stat-value" id="panel-product-sales" style="color: #fff;">0 vds.</div>
            </div>
        </div>

        <button class="close-btn" onclick="closePanel()">Fermer</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZimxjbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4'.trim();
        
        const supabaseClient = supabase.createClient(supabaseUrl, apiKey);

        async function loadProducts() {
            const container = document.getElementById('products-container');
            const totalCount = document.getElementById('total-count');
            
            try {
                // Sélection sécurisée des colonnes existantes dans ta base de données
                const { data: products, error } = await supabaseClient
                    .from('products')
                    .select('name, stock_quantity, image_url, discount_price'); 

                if (error) throw error;

                if (!products || products.length === 0) {
                    totalCount.innerText = "Articles : 0";
                    container.innerHTML = `<div style="text-align: center; padding: 40px; color: #666;">Aucun article en vente pour le moment.</div>`;
                    return;
                }

                totalCount.innerText = `Articles : ${products.length}`;
                container.innerHTML = '';

                products.forEach(product => {
                    const stock = parseInt(product.stock_quantity) || 0;
                    const imgUrl = product.image_url || '';
                    
                    // Création de l'élément produit
                    const item = document.createElement('div');
                    item.className = 'product-item';
                    
                    // Événement au clic pour ouvrir le menu coulissant du bas
                    item.onclick = () => openPanel(product);

                    item.innerHTML = `
                        <div class="product-info-block">
                            <div class="product-img" style="background-image: url('${imgUrl}');"></div>
                            <div class="product-details">
                                <div class="product-name">${product.name}</div>
                                <div class="product-stock ${stock <= 0 ? 'empty' : ''}">
                                    ${stock <= 0 ? 'Rupture de stock' : 'En stock : ' + stock}
                                </div>
                            </div>
                        </div>
                        <div class="sales-badge">0 vds</div>
                    `;
                    container.appendChild(item);
                });

            } catch (err) {
                console.error(err);
                totalCount.innerText = "Erreur de chargement";
                container.innerHTML = `<div style="text-align: center; color: #ff4444; padding: 20px;">Erreur lors de la synchronisation avec la base de données.</div>`;
            }
        }

        // Fonctions d'animation du menu coulissant
        function openPanel(product) {
            document.getElementById('panel-product-name').innerText = product.name;
            document.getElementById('panel-product-stock').innerText = product.stock_quantity || 0;
            document.getElementById('panel-product-img').style.backgroundImage = `url('${product.image_url || ''}')`;
            
            // On affiche l'overlay et le panneau remonte
            document.getElementById('panel-overlay').classList.add('open');
            document.getElementById('details-panel').classList.add('open');
        }

        function closePanel() {
            // Le panneau redescend et l'overlay disparait
            document.getElementById('panel-overlay').classList.remove('open');
            document.getElementById('details-panel').classList.remove('open');
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
