<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .debug-box { background: #222; border: 1px solid #ff0000; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 12px; }
        .success { border-color: #00ff00; }
    </style>
</head>
<body>

    <h1>Diagnostic Admin</h1>
    <div id="debug-log" class="debug-box">Initialisation du diagnostic...</div>

    <script>
        const log = (msg, isError = false) => {
            const el = document.getElementById('debug-log');
            el.innerHTML += `<br>${isError ? '🔴' : '✅'} ${msg}`;
            console.log(msg);
        };

        const supabase = supabase.createClient(
            'https://jsuvimxjmjiljntmgbzu.supabase.co', 
            'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
        );

        async function runDiagnostic() {
            try {
                log("Tentative de connexion à Supabase...");
                
                // Test de lecture
                const { data, error } = await supabase.from('orders').select('*');
                
                if (error) throw error;

                log("Connexion réussie !");
                log("Nombre de commandes trouvées : " + (data ? data.length : 0));
                
                if (data && data.length > 0) {
                    log("Dernière commande : " + JSON.stringify(data[0]).substring(0, 50) + "...");
                } else {
                    log("Aucune donnée dans la table 'orders'. Vérifie si le formulaire envoie bien ici.", true);
                }

            } catch (err) {
                log("ERREUR CRITIQUE : " + err.message, true);
            }
        }

        runDiagnostic();
    </script>
</body>
</html>
