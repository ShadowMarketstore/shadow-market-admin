<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Administration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #0ff; --bg-color: #000; }
        body { background: var(--bg-color); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-color); padding-bottom: 10px; margin-bottom: 20px; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { border: 1px solid var(--main-color); padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--main-color); }
        .order-list { display: flex; flex-direction: column; gap: 15px; }
        .order-card { background: #151515; border-left: 4px solid var(--main-color); padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; }
        .order-info strong { color: var(--main-color); font-size: 1.1em; }
        .order-actions { display: flex; gap: 15px; align-items: center; }
        .btn-action { cursor: pointer; font-size: 20px; transition: 0.3s; }
        .btn-action:hover { transform: scale(1.2); }
        .status-badge { font-size: 12px; padding: 5px 12px; border-radius: 20px; background: #333; text-transform: uppercase; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #151515; border: 1px solid var(--main-color); padding: 25px; border-radius: 12px; max-width: 500px; margin: 50px auto; position: relative; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard Admin</h1>
        <a href="index.html" style="color:var(--main-color); text-decoration:none;"><i class="fas fa-home"></i> Retour</a>
    </div>

    <div id="debug" style="color:yellow; font-size: 12px; margin-bottom: 10px;"></div>

    <div class="stats-container">
        <div class="stat-card">Total<br><div id="total" class="stat-value">0</div></div>
        <div class="stat-card">Traités<br><div id="traite" class="stat-value">0</div></div>
    </div>

    <div id="order-list" class="order-list">Chargement...</div>

    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="color:var(--main-color)">Détails</h2>
            <div id="modal-body" style="line-height: 1.6;"></div>
            <button style="margin-top:20px; background:var(--main-color); border:none; padding:10px 20px; cursor:pointer;" onclick="document.getElementById('modal').style.display='none'">Fermer</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const debug = document.getElementById('debug');

        async function loadData() {
            debug.innerText = "Connexion...";
            try {
                const { data, error } = await db.from('orders').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                debug.innerText = `✅ ${data.length} commandes chargées.`;
                document.getElementById('total').innerText = data.length;
                document.getElementById('traite').innerText = data.filter(o => o.status === 'terminée').length;

                document.getElementById('order-list').innerHTML = data.map(o => `
                    <div class="order-card" onclick="showDetails('${o.id}')">
                        <div class="order-info">
                            <strong>${o.customer_email || 'Inconnu'}</strong><br>
                            <small>${o.modele || 'N/A'} | RAM: ${o.ram || '?'}Go</small>
                        </div>
                        <div class="order-actions">
                            <span class="status-badge">${o.status || '...'}</span>
                            <i class="fas fa-trash btn-action" style="color:red" onclick="event.stopPropagation(); deleteOrder('${o.id}')"></i>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                debug.innerText = "Erreur : " + err.message;
            }
        }

        async function deleteOrder(id) {
            if(confirm('Supprimer cette commande définitivement ?')) {
                const { error } = await db.from('orders').delete().eq('id', id);
                if(error) alert(error.message); else loadData();
            }
        }

        async function showDetails(id) {
            const { data, error } = await db.from('orders').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('modal-title').innerText = "Commande : " + data.customer_email;
                document.getElementById('modal-body').innerHTML = `
                    <p><strong>Modèle :</strong> ${data.modele}</p>
                    <p><strong>RAM :</strong> ${data.ram} Go</p>
                    <p><strong>Statut :</strong> ${data.status}</p>
                    <p><strong>Date :</strong> ${new Date(data.created_at).toLocaleString()}</p>
                `;
                document.getElementById('modal').style.display = 'block';
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
