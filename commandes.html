<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Diagnostic</h1>
    <div id="output">Démarrage...</div>

    <script>
        // 1. Vérification que Supabase est chargé
        if (typeof supabase === 'undefined') {
            document.getElementById('output').innerHTML = "Erreur : La bibliothèque Supabase n'est pas chargée !";
        } else {
            document.getElementById('output').innerHTML = "Bibliothèque chargée. Connexion...";
            
            const client = supabase.createClient(
                'https://jsuvimxjmjiljntmgbzu.supabase.co', 
                'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
            );

            // 2. Test immédiat
            client.from('orders').select('*').then(({ data, error }) => {
                if (error) {
                    document.getElementById('output').innerHTML = "Erreur Supabase : " + error.message;
                } else {
                    document.getElementById('output').innerHTML = "Succès ! Commandes trouvées : " + data.length;
                    console.log("Données :", data);
                }
            }).catch(e => {
                document.getElementById('output').innerHTML = "Exception : " + e;
            });
        }
    </script>
</body>
</html>
