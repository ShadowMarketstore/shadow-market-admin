<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { border: 1px solid #0ff; padding: 15px; border-radius: 8px; flex: 1; text-align: center; }
        .val { font-size: 20px; color: #0ff; font-weight: bold; }
        .card { border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #111; position: relative; }
        .star { font-size: 20px; cursor: pointer; color: #444; margin-right: 10px; }
        .star.active { color: #ffd700; }
        .trash { position: absolute; top: 15px; right: 15px; color: #f00; cursor: pointer; }
    </style>
</head>
<body>

    <a href="index.html" style="color:#0ff; text-decoration:none;">⬅ Retour</a>
    <h1>Dashboard Admin</h1>
    
    <div class="stats">
        <div class="stat-box">Total<br><div id="total" class="val">0</div></div>
        <div class="stat-box">À traiter<br><div id="pending" class="val">0</div></div>
    </div>

    <div id="list">Chargement...</div>

    <script>
        const supabase = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

        async function loadData() {
            const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
            
            if (error) return document.getElementById('list').innerText = "Erreur : " + error.message;

            // Mise à jour compteurs
            document.getElementById('total').innerText = data.length;
            document.getElementById('pending').innerText = data.filter(o => o.status === 'en attente').length;

            // Affichage liste
            document.getElementById('list').innerHTML = data.map(o => `
                <div class="card">
                    <i class="fas fa-star star ${o.status === 'terminée' ? 'active' : ''}" 
                       onclick="toggleStatus('${o.id}', '${o.status}')"></i>
                    <strong>${o.customer_email}</strong>
                    <i class="fas fa-trash trash" onclick="deleteOrder('${o.id}')"></i>
                    <p>${o.modele} | ${o.ram}Go RAM</p>
                    <small>${o.status}</small>
                </div>
            `).join('');
        }

        async function toggleStatus(id, current) {
            const newStatus = current === 'terminée' ? 'en attente' : 'terminée';
            await supabase.from('orders').update({ status: newStatus }).eq('id', id);
            loadData();
        }

        async function deleteOrder(id) {
            if(confirm("Supprimer cette commande ?")) {
                await supabase.from('orders').delete().eq('id', id);
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
