<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes Produits</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Articles de la boutique</h1>
    <div id="status">Chargement...</div>
    <div id="products-container"></div>

    <script>
        // Configuration Supabase
        const supabaseUrl = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZimxjbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchProducts() {
            const container = document.getElementById('products-container');
            const status = document.getElementById('status');
            
            try {
                // Utilisation des noms de colonnes exacts vus dans tes captures :
                // name, stock_quantity, price, image_url
                const { data, error } = await supabase
                    .from('products')
                    .select('name, stock_quantity, price, image_url');

                if (error) throw error;

                status.innerText = ""; // Effacer le statut de chargement
                
                if (data.length === 0) {
                    container.innerHTML = "<p>Aucun produit trouvé.</p>";
                    return;
                }

                // Affichage des produits
                container.innerHTML = data.map(product => `
                    <div style="border: 1px solid #333; margin: 10px; padding: 10px;">
                        <h3>${product.name}</h3>
                        <p>Stock : ${product.stock_quantity}</p>
                        <p>Prix : ${product.price} CFA</p>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Erreur détaillée :", err);
                status.innerText = "Erreur lors de la synchronisation avec la base de données.";
            }
        }

        fetchProducts();
    </script>
</body>
</html>
