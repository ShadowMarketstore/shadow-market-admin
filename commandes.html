<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DEBUG ADMIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #0ff; font-family: monospace; padding: 20px; }
        .log { border: 1px solid #0ff; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>CONSOLE DE DIAGNOSTIC</h1>
    <div id="debug-zone" class="log">Démarrage...</div>

    <script>
        const debugZone = document.getElementById('debug-zone');
        const log = (msg) => debugZone.innerHTML += `<br>> ${msg}`;

        try {
            const supabase = supabase.createClient(
                'https://jsuvimxjmjiljntmgbzu.supabase.co', 
                'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
            );
            log("Client Supabase initialisé.");

            async function test() {
                log("Tentative de lecture de la table 'orders'...");
                const { data, error } = await supabase.from('orders').select('*');
                
                if (error) {
                    log("ERREUR SUPABASE: " + error.message);
                } else {
                    log("Connexion réussie !");
                    log("Nombre de commandes trouvées : " + data.length);
                    if(data.length > 0) log("Données reçues : OK");
                }
            }
            test();
        } catch (e) {
            log("ERREUR FATALE: " + e.message);
        }
    </script>
</body>
</html>
