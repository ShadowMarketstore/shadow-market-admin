<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Administration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #0ff; --bg-color: #000; }
        body { background: var(--bg-color); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-color); padding-bottom: 10px; }
        .stats-container { display: flex; gap: 20px; margin: 20px 0; }
        .stat-card { border: 1px solid var(--main-color); padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--main-color); }
        .order-card { background: #151515; border-left: 4px solid var(--main-color); padding: 15px; margin-bottom: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .actions i { cursor: pointer; margin-left: 15px; font-size: 18px; }
        .status-badge { font-size: 12px; padding: 5px 10px; border-radius: 20px; background: #333; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard Admin</h1>
        <a href="index.html" style="color:var(--main-color)">Retour Accueil</a>
    </div>
    
    <div class="stats-container">
        <div class="stat-card">Total<br><div id="total" class="stat-value">0</div></div>
        <div class="stat-card">Traités<br><div id="traite" class="stat-value">0</div></div>
    </div>

    <div id="order-list">Chargement des données...</div>

    <script>
        const supabase = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

        async function loadData() {
            const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
            
            if (error) {
                document.getElementById('order-list').innerHTML = `<p style="color:red">Erreur : ${error.message}</p>`;
                return;
            }

            // Mise à jour compteurs
            document.getElementById('total').innerText = data.length;
            document.getElementById('traite').innerText = data.filter(o => o.status === 'terminée').length;

            // Construction de la liste
            if (data.length === 0) {
                document.getElementById('order-list').innerHTML = "<p>Aucune commande enregistrée.</p>";
            } else {
                document.getElementById('order-list').innerHTML = data.map(o => `
                    <div class="order-card">
                        <div>
                            <strong>${o.customer_email}</strong><br>
                            <small>${o.modele} | ${o.ram}Go RAM</small>
                        </div>
                        <div class="actions">
                            <span class="status-badge">${o.status}</span>
                            <i class="fas fa-check" style="color:green" onclick="updateStatus('${o.id}', 'terminée')"></i>
                            <i class="fas fa-trash" style="color:red" onclick="deleteOrder('${o.id}')"></i>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function updateStatus(id, newStatus) {
            await supabase.from('orders').update({ status: newStatus }).eq('id', id);
            loadData();
        }

        async function deleteOrder(id) {
            if(confirm("Confirmer la suppression ?")) {
                await supabase.from('orders').delete().eq('id', id);
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
