<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Ajout</title>
    <style>
        body { background: #050505; color: #00ffff; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px #00ffff; }
        
        .box {
            background: #111;
            border: 2px solid #00ffff;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            clip-path: polygon(5% 0%, 100% 0%, 100% 90%, 95% 100%, 0% 100%, 0% 10%);
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 15px;
            margin: 10px 0;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            background: #00ffff;
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 20px #00ffff;
            margin-top: 10px;
        }

        .success-msg { display: none; text-align: center; color: #0f0; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>...</nav> <h1>Ajouter un produit</h1>
    
    <div class="box">
        <label>Nom du produit</label>
        <input type="text" id="name" placeholder="Ex: Item VIP">
        
        <label>Lien de l'image</label>
        <input type="text" id="image_url" placeholder="https://...">
        
        <label>Nombre de ventes</label>
        <input type="number" id="sales_count" value="0">
        
        <button id="add-btn">Valider et Ajouter</button>
        <div id="msg" class="success-msg">PRODUIT ENVOYÉ ! ✅</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Ton script Supabase reste identique...
        const supabase = supabase.createClient('URL', 'KEY');

        document.getElementById('add-btn').onclick = async () => {
            // ... (logique d'ajout) ...
            document.getElementById('msg').style.display = 'block';
        };
    </script>
</body>
</html>
