<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Panel Admin</title>
    <style>
        body { background: #050505; color: #00ffff; font-family: 'Courier New', Courier, monospace; padding: 10px; margin: 0; }
        .nav-bar { background: #111; padding: 15px; border-bottom: 2px solid #00ffff; display: flex; gap: 15px; margin-bottom: 20px; }
        .nav-bar a { color: white; text-decoration: none; font-size: 14px; }
        .form-card { background: #111; padding: 20px; border: 1px solid #333; border-radius: 10px; max-width: 500px; margin: 0 auto; }
        
        /* Zone Média */
        .upload-zone { border: 2px dashed #00ffff; padding: 30px; text-align: center; color: #00ffff; cursor: pointer; margin-bottom: 20px; border-radius: 5px; }

        /* Menu Options Upload */
        #uploadMenu { display: none; margin-bottom: 20px; border: 1px solid #00ffff; padding: 5px; border-radius: 5px; }
        .menu-option {
            width: 100%; background: #000; border: 1px solid #00ffff; color: #00ffff;
            padding: 12px; margin-bottom: 5px; cursor: pointer; text-align: center; display: block;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
        }
        .menu-option:hover { background: #00ffff; color: #000; }

        /* Inputs invisibles pour l'upload d'image */
        .hidden-input {
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }

        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; margin-bottom: 15px; border-radius: 5px; box-sizing: border-box; font-family: sans-serif; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button#add-btn { background: #00ffff; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 0 10px #00ffff; text-transform: uppercase; font-family: 'Courier New', Courier, monospace; font-size: 1.1em; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html">Boutique</a>
        <a href="formulaire.html" style="color: #00ffff;">Ajouter un Article</a>
    </nav>

    <h1 style="text-align: center; color: #00ffff;">Ajouter un Article</h1>

    <div class="form-card">
        <div class="upload-zone" onclick="document.getElementById('uploadMenu').style.display = 'block'" id="uploadZone">
            <p id="uploadStatus">📷 Ajouter un média (Image du module)</p>
        </div>

        <div id="uploadMenu">
            <button type="button" class="menu-option" onclick="document.getElementById('cameraInput').click()">Prendre une photo</button>
            <button type="button" class="menu-option" onclick="document.getElementById('galleryInput').click()">Prendre dans la galerie</button>
            <button type="button" class="menu-option" onclick="document.getElementById('fileInput').click()">Sélectionner un fichier</button>
        </div>

        <input type="file" id="cameraInput" class="hidden-input" capture="environment" accept="image/*">
        <input type="file" id="galleryInput" class="hidden-input" accept="image/*">
        <input type="file" id="fileInput" class="hidden-input" accept="image/*,application/*">

        <label for="name">Nom de l'article :</label>
        <input type="text" id="name" placeholder="Ex: Shadow_Code_Premium !">
        
        <label for="desc">Description du module :</label>
        <textarea id="desc" rows="4" placeholder="Ajoutez les détails ou instructions du produit..."></textarea>

        <div class="price-grid">
            <div>
                <label for="old_price">Prix de base (EUR) :</label>
                <input type="number" id="old_price" placeholder="Ex: 25.00" step="0.01">
            </div>
            <div>
                <label for="price">Prix final calculé (EUR) :</label>
                <input type="number" id="price" placeholder="Prix après remise" readonly style="background: #111; border-color: #222; color: #00ffff;">
            </div>
        </div>

        <label for="stock">Quantité en stock :</label>
        <input type="number" id="stock" placeholder="Quantité disponible" min="0" value="1">

        <label for="discount">Appliquer une réduction :</label>
        <select id="discount">
            <option value="0">Aucune réduction (0%)</option>
            <option value="5">-5%</option>
            <option value="10">-10%</option>
            <option value="15">-15%</option>
            <option value="20">-20%</option>
            <option value="30">-30%</option>
            <option value="50">-50%</option>
        </select>
        
        <label for="ribbon">Badge / Ruban d'affichage :</label>
        <select id="ribbon">
            <option value="">Aucun Badge</option>
            <option value="new">NEW (Nouveauté)</option>
            <option value="promo">PROMO (Réduction)</option>
        </select>
        
        <button id="add-btn">Enregistrer le produit</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabaseClient = null;
        let uploadedImageUrl = "";

        const supabaseUrl = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
        const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4'.trim();

        try {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(supabaseUrl, apiKey);
            }
        } catch (e) {
            console.error("Erreur d'initialisation Supabase : ", e);
        }
        
        // Gestion de la synchronisation du stockage d'images (Storage Bucket)
        async function processFile(file) {
            if (!file) return;

            document.getElementById('uploadMenu').style.display = 'none';
            document.getElementById('uploadStatus').style.color = '#00ffff';
            document.getElementById('uploadStatus').innerText = "⏳ Envoi de l'image : " + file.name;

            const filePath = `public/${Date.now()}_${file.name}`;
            const uploadUrl = `${supabaseUrl}/storage/v1/object/products/${filePath}`;

            try {
                const response = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'apikey': apiKey,
                        'Content-Type': file.type
                    },
                    body: file
                });

                if (response.ok) {
                    uploadedImageUrl = `${supabaseUrl}/storage/v1/object/public/products/${filePath}`;
                    document.getElementById('uploadStatus').style.color = '#00ff00';
                    document.getElementById('uploadStatus').innerText = "✅ Image liée avec succès !";
                } else {
                    const errData = await response.json();
                    alert("Erreur de stockage : " + (errData.message || response.statusText));
                    document.getElementById('uploadStatus').style.color = '#ff3333';
                    document.getElementById('uploadStatus').innerText = "❌ Échec de l'envoi de la photo.";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('uploadStatus').innerText = "❌ Erreur de réseau média.";
            }
        }

        document.getElementById('cameraInput').addEventListener('change', function(e) { processFile(e.target.files[0]); });
        document.getElementById('galleryInput').addEventListener('change', function(e) { processFile(e.target.files[0]); });
        document.getElementById('fileInput').addEventListener('change', function(e) { processFile(e.target.files[0]); });

        // Calcul automatique du prix final selon le pourcentage sélectionné
        function recalculerPrixFinal() {
            const prixOrigine = parseFloat(document.getElementById('old_price').value) || 0;
            const reduction = parseInt(document.getElementById('discount').value) || 0;
            
            const prixCalcule = prixOrigine * (1 - reduction / 100);
            document.getElementById('price').value = prixCalcule.toFixed(2);
        }

        document.getElementById('old_price').addEventListener('input', recalculerPrixFinal);
        document.getElementById('discount').addEventListener('change', recalculerPrixFinal);

        // Envoi final des données nettoyées vers Supabase
        document.getElementById('add-btn').onclick = async () => {
            const nameField = document.getElementById('name').value.trim();
            if (!nameField) {
                alert("Donne un nom à ton article avant de valider.");
                return;
            }

            const prixOrigine = parseFloat(document.getElementById('old_price').value) || 0;
            const reduction = parseInt(document.getElementById('discount').value) || 0;
            const prixFinal = parseFloat(document.getElementById('price').value) || prixOrigine;
            const quantiteStock = parseInt(document.getElementById('stock').value) || 0;

            // Alignement strict avec le schéma de ta table Supabase
            const dataToSave = {
                name: nameField,
                price: prixFinal,                 
                old_price: prixOrigine,           
                discount: reduction,             
                stock_quantity: quantiteStock, // SYNCHRONISÉ : Fini l'erreur de cache sur la colonne 'stock' !
                description: document.getElementById('desc').value,
                ribbon: document.getElementById('ribbon').value,
                image_url: uploadedImageUrl || null
            };

            if (supabaseClient) {
                const { error } = await supabaseClient.from('products').insert([dataToSave]);
                if (error) {
                    console.error("Détails de l'erreur :", error);
                    alert("Erreur Base de données : " + error.message);
                } else {
                    alert("Module Shadow Market enregistré et synchronisé en direct !");
                    location.reload();
                }
            } else {
                alert("Erreur de communication : Client Supabase inaccessible.");
            }
        };
    </script>
</body>
</html>
