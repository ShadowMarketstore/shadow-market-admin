<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Ajout</title>
    <style>
        body { background: #050505; color: #00ffff; font-family: 'Courier New', Courier, monospace; padding: 20px; margin: 0; }
        h1 { color: #00ffff; text-transform: uppercase; text-shadow: 0 0 10px #00ffff; margin-bottom: 20px; }
        
        .form-card { background: #111; padding: 20px; border: 1px solid #00ffff; border-radius: 8px; }

        /* Zones de saisie : Contour Cramoisi Néon */
        .upload-zone, input, textarea, select { 
            width: 100%; background: #000; border: 1px solid #ff0033; 
            color: #00ffff; padding: 15px; margin-bottom: 10px; box-sizing: border-box;
            box-shadow: 0 0 5px rgba(255, 0, 51, 0.3);
        }

        .upload-zone { border: 2px dashed #ff0033; text-align: center; cursor: pointer; color: #ff0033; }

        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Bouton Enregistrer : Fond Rouge, Texte Blanc */
        button { 
            width: 100%; background: #ff0033; color: #ffffff; border: none; 
            padding: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Article</h1>
    
    <div class="form-card">
        <div class="upload-zone">📷 Ajouter un média</div>
        
        <input type="text" id="name" placeholder="Nom de l'article">
        
        <div class="price-grid">
            <input type="number" id="price" placeholder="Prix CFA">
            <input type="number" id="old_price" placeholder="Prix avant réduction">
        </div>
        
        <textarea id="desc" rows="3" placeholder="Ajoutez une description"></textarea>
        
        <select id="ribbon">
            <option>Ruban (ex: Promo, Nouveauté)</option>
        </select>
        
        <button id="add-btn">ENREGISTRER</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('URL', 'KEY');
        document.getElementById('add-btn').onclick = async () => {
            alert("Produit enregistré !");
        };
    </script>
</body>
</html>
