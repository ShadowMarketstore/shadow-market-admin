<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration - Shadow Market</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #121212; color: #ffffff; font-family: Arial, sans-serif; padding: 20px;">

  <h1 style="text-align: center; color: #00bfa5;">Ajouter un Article</h1>

  <form id="add-product-form" style="max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
    
    <div class="form-group" style="margin-bottom: 15px;">
      <label for="product-title" style="display: block; font-weight: bold; margin-bottom: 5px;">Nom de l'article :</label>
      <input type="text" id="product-title" name="title" required style="width: 100%; padding: 8px; box-sizing: border-box; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px;">
    </div>

    <div class="form-group" style="margin-bottom: 15px;">
      <label for="product-description" style="display: block; font-weight: bold; margin-bottom: 5px;">Description :</label>
      <textarea id="product-description" name="description" rows="3" style="width: 100%; padding: 8px; box-sizing: border-box; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px;"></textarea>
    </div>

    <div class="form-group" style="margin-bottom: 15px;">
      <label for="product-price" style="display: block; font-weight: bold; margin-bottom: 5px;">Prix de base (CFA) :</label>
      <input type="number" id="product-price" name="price" step="0.01" required style="width: 100%; padding: 8px; box-sizing: border-box; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px;">
    </div>

    <div class="form-group" style="margin-bottom: 15px;">
      <label for="product-stock" style="display: block; font-weight: bold; margin-bottom: 5px;">Quantité en stock :</label>
      <input type="number" id="product-stock" name="stock" min="0" value="1" required style="width: 100%; padding: 8px; box-sizing: border-box; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px;">
    </div>

    <div class="form-group" style="margin-bottom: 20px;">
      <label for="product-discount" style="display: block; font-weight: bold; margin-bottom: 5px;">Appliquer une réduction :</label>
      <select id="product-discount" name="discount" style="width: 100%; padding: 8px; box-sizing: border-box; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px;">
        <option value="0">Aucune réduction (0%)</option>
        <option value="5">-5%</option>
        <option value="10">-10%</option>
        <option value="15">-15%</option>
        <option value="20">-20%</option>
        <option value="30">-30%</option>
        <option value="50">-50%</option>
      </select>
    </div>

    <button type="submit" style="background-color: #00bfa5; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold;">
      Enregistrer le produit
    </button>
  </form>

  <script>
    // Initialisation avec tes accès de projet valides
    const SUPABASE_URL = "https://jsuvimxjmjiljntmgbzu.supabase.co";
    const SUPABASE_ANON_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4";
    
    const { createClient } = window['@supabase/supabase-js'];
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Gestion de l'envoi du formulaire
    document.getElementById('add-product-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('product-title').value;
      const description = document.getElementById('product-description').value;
      const priceBase = parseFloat(document.getElementById('product-price').value);
      
      // Récupération dynamique des deux nouvelles valeurs
      const discountPercent = parseInt(document.getElementById('product-discount').value);
      const stockValue = parseInt(document.getElementById('product-stock').value);

      // Algorithme : Calcul automatique du prix final remisé à afficher en boutique
      const priceFinal = priceBase * (1 - discountPercent / 100);

      // Nom de l'image de ton produit
      const urlDeLimage = "1000306986.jpg"; 

      // Préparation de l'objet produit mis à jour avec toutes les spécifications
      const newProduct = {
        title: title,
        description: description,
        price_base: priceBase,     // Stocke le prix initial
        discount: discountPercent, // Stocke le pourcentage choisi (ex: 30)
        price: priceFinal,         // Stocke le prix calculé après remise (-30%)
        stock: stockValue,         // Stocke le nombre d'articles dispo
        image_url: urlDeLimage
      };

      try {
        const { data, error } = await supabase
          .from('products')
          .insert([newProduct]);

        if (error) throw error;

        alert("Produit enregistré avec succès sur le Shadow Market !");
        document.getElementById('add-product-form').reset(); 
        
      } catch (error) {
        console.error("Erreur d'insertion Supabase :", error.message);
        alert("Une erreur est survenue lors de l'enregistrement : " + error.message);
      }
    });
  </script>
</body>
</html>
