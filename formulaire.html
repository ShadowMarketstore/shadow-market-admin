<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Liste</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* Titre principal */
        h1 { color: #00ffff; text-align: center; font-size: 24px; text-shadow: 0 0 10px #00ffff; margin-bottom: 30px; }

        /* Conteneur global avec bordure cyan */
        .main-container {
            border: 2px solid #00ffff;
            padding: 20px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Carte Produit */
        .product-card {
            background: #111;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 8px;
        }
        .product-card img { width: 100%; border-radius: 5px; margin-bottom: 10px; }
        .product-name { font-weight: bold; margin-bottom: 5px; }
        .product-info { color: #00ffff; font-size: 12px; margin-bottom: 5px; }

        /* Bouton rouge cramoisi */
        .action-btn {
            background: #d61f43;
            color: #fff;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Barre de navigation bas */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #000; border-top: 2px solid #00ffff;
            display: flex; justify-content: space-around; padding: 15px;
        }
    </style>
</head>
<body>

    <h1>LISTE DES PRODUITS</h1>

    <div class="main-container">
        <div class="product-card">
            <img src="laptop.jpg" alt="Laptop">
            <div class="product-name">HP ProBook 4440S</div>
            <div class="product-info">RAM: 8 | Stockage: 350 Go</div>
            <button class="action-btn">VOIR DÉTAILS</button>
        </div>

        <div class="product-card">
            <img src="diamond.jpg" alt="VIP">
            <div class="product-name">VIP Item</div>
            <div class="product-info">Accès Premium Illimité</div>
            <button class="action-btn">AJOUTER AU PANIER</button>
        </div>
    </div>

    <div class="bottom-nav">
        <span>👤</span> <span>🛒</span> <span>🏠</span> <span>💬</span>
    </div>

</body>
</html>
