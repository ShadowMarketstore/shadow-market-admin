<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Ajout Pro</title>
    <style>
        body { background: #050505; color: #00ffff; font-family: 'Courier New', Courier, monospace; padding: 10px; margin: 0; }
        .nav-bar { background: #111; padding: 15px; border-bottom: 2px solid #00ffff; display: flex; gap: 15px; margin-bottom: 20px; }
        .nav-bar a { color: white; text-decoration: none; font-size: 14px; }
        .form-card { background: #111; padding: 20px; border: 1px solid #333; border-radius: 10px; }
        
        /* Zone Média */
        .upload-zone { border: 2px dashed #00ffff; padding: 30px; text-align: center; color: #00ffff; cursor: pointer; margin-bottom: 20px; border-radius: 5px; }

        /* Menu Options */
        #uploadMenu { display: none; margin-bottom: 20px; border: 1px solid #00ffff; padding: 5px; border-radius: 5px; }
        .menu-option {
            width: 100%; background: #000; border: 1px solid #00ffff; color: #00ffff;
            padding: 12px; margin-bottom: 5px; cursor: pointer; text-align: center; display: block;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
        }
        .menu-option:hover { background: #00ffff; color: #000; }

        /* Rendre les inputs invisibles mais actifs pour les mobiles */
        .hidden-input {
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }

        input, textarea, select { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; margin-bottom: 10px; border-radius: 5px; box-sizing: border-box; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button#add-btn { background: #00ffff; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 0 10px #00ffff; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html">Accueil</a>
        <a href="produits.html">Stock</a>
        <a href="formulaire.html" style="color: #00ffff;">Ajouter</a>
    </nav>

    <h1>Article</h1>

    <div class="form-card">
        <div class="upload-zone" onclick="document.getElementById('uploadMenu').style.display = 'block'" id="uploadZone">
            <p id="uploadStatus">📷 Ajouter un média</p>
        </div>

        <div id="uploadMenu">
            <button type="button" class="menu-option" onclick="document.getElementById('cameraInput').click()">Prendre une photo</button>
            <button type="button" class="menu-option" onclick="document.getElementById('galleryInput').click()">Prendre dans la galerie</button>
            <button type="button" class="menu-option" onclick="document.getElementById('fileInput').click()">Sélectionner un fichier</button>
        </div>

        <input type="file" id="cameraInput" class="hidden-input" capture="environment" accept="image/*">
        <input type="file" id="galleryInput" class="hidden-input" accept="image/*">
        <input type="file" id="fileInput" class="hidden-input" accept="image/*,application/*">

        <input type="text" id="name" placeholder="Nom de l'article">
        <div class="price-grid">
            <input type="number" id="price" placeholder="Prix CFA">
            <input type="number" id="old_price" placeholder="Prix avant réduction">
        </div>
        <textarea id="desc" rows="4" placeholder="Ajoutez une description"></textarea>
        <select id="ribbon">
            <option>Ruban (ex: Promo, Nouveauté)</option>
            <option value="promo">Promo</option>
            <option value="nouveau">Nouveauté</option>
        </select>
        <button id="add-btn">Enregistrer</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabaseClient = null;
        let uploadedImageUrl = "";

        // Initialisation avec tes vrais accès du Shadow Market
        try {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'Sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');
            }
        } catch (e) {
            console.error("Erreur de connexion initiale à Supabase : ", e);
        }
        
        // Fonction globale appelée dès qu'un média est choisi
        async function processFile(file) {
            if (!file) return;

            // Masque immédiatement le menu pour nettoyer l'interface
            document.getElementById('uploadMenu').style.display = 'none';
            document.getElementById('uploadStatus').innerText = "⏳ Synchronisation de : " + file.name;

            if (supabaseClient) {
                try {
                    // Upload du fichier dans le bucket 'products'
                    const { data, error } = await supabaseClient.storage
                        .from('products')
                        .upload(`public/${Date.now()}_${file.name}`, file);

                    if (error) {
                        alert("Erreur stockage Supabase : " + error.message);
                        document.getElementById('uploadStatus').innerText = "❌ Échec de l'envoi.";
                    } else {
                        // Récupération de l'URL publique générée
                        const { data: publicUrlData } = supabaseClient.storage
                            .from('products')
                            .getPublicUrl(data.path);
                        
                        uploadedImageUrl = publicUrlData.publicUrl;
                        document.getElementById('uploadStatus').innerText = "✅ En ligne : " + file.name;
                    }
                } catch (err) {
                    console.error(err);
                    document.getElementById('uploadStatus').innerText = "❌ Erreur système d'upload.";
                }
            } else {
                alert("Supabase n'est pas initialisé correctement.");
            }
        }

        // Liaison des écouteurs de fichiers
        document.getElementById('cameraInput').addEventListener('change', function(e) { processFile(e.target.files[0]); });
        document.getElementById('galleryInput').addEventListener('change', function(e) { processFile(e.target.files[0]); });
        document.getElementById('fileInput').addEventListener('change', function(e) { processFile(e.target.files[0]); });

        // Gestion du clic sur Enregistrer
        document.getElementById('add-btn').onclick = async () => {
            if (!uploadedImageUrl) {
                alert("Veuillez d'abord uploader un média avant d'enregistrer.");
                return;
            }

            const dataToSave = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                old_price: document.getElementById('old_price').value,
                description: document.getElementById('desc').value,
                ribbon: document.getElementById('ribbon').value,
                image_url: uploadedImageUrl
            };

            if (supabaseClient) {
                const { error } = await supabaseClient.from('products').insert([dataToSave]);
                if (error) {
                    alert("Erreur base de données : " + error.message);
                } else {
                    alert("Produit enregistré avec succès sur le Shadow Market !");
                    location.reload(); // Actualise pour vider le formulaire
                }
            }
        };
    </script>
</body>
</html>
