<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Ajout</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Courier New', Courier, monospace; padding: 15px; margin: 0; }
        
        /* Menu */
        .nav-bar { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav-bar a { color: #555; text-decoration: none; font-size: 14px; }
        .nav-bar a.active { color: #ff0033; }

        h1 { color: #ff0033; font-size: 22px; margin-bottom: 20px; text-shadow: 0 0 5px #ff0033; }

        .form-card { background: #0a0a0a; padding: 20px; border: 1px solid #ff0033; border-radius: 8px; }

        /* Zone Image (plus fine) */
        .upload-zone { 
            border: 1px dashed #ff0033; padding: 20px; text-align: center; 
            color: #ff0033; cursor: pointer; margin-bottom: 20px; font-size: 13px;
        }

        /* Inputs plus fins */
        input, textarea, select { 
            width: 100%; background: #000; border: 1px solid #ff0033; color: white; 
            padding: 10px; margin-bottom: 10px; border-radius: 4px; box-sizing: border-box;
            font-size: 13px;
        }

        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Bouton Enregistrer (plus fin et harmonieux) */
        button { 
            background: #ff0033; color: white; border: none; padding: 12px; 
            width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px;
            font-size: 14px; margin-top: 10px; transition: 0.3s;
        }
        button:hover { background: #cc0029; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html">Accueil</a>
        <a href="produits.html">Stock</a>
        <a href="formulaire.html" class="active">Ajouter</a>
    </nav>

    <h1>Article</h1>

    <div class="form-card">
        <div class="upload-zone">📷 Ajouter un média</div>
        <input type="text" id="name" placeholder="Nom de l'article">
        <div class="price-grid">
            <input type="number" id="price" placeholder="Prix CFA">
            <input type="number" id="old_price" placeholder="Prix avant réduction">
        </div>
        <textarea id="desc" rows="3" placeholder="Ajoutez une description"></textarea>
        <select id="ribbon">
            <option>Ruban (ex: Promo, Nouveauté)</option>
        </select>
        <button id="add-btn">ENREGISTRER</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('URL', 'KEY');
        document.getElementById('add-btn').onclick = async () => {
            alert("Sauvegarde en cours...");
            // Logique d'ajout ici
        };
    </script>
</body>
</html>
