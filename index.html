<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Ajouter un produit</h2>
    <input type="text" id="name" placeholder="Nom du produit"><br>
    <input type="number" id="price" placeholder="Prix"><br>
    <input type="number" id="stock" placeholder="Stock"><br>
    <button onclick="saveProduct()">Ajouter le produit</button>

    <script>
        const supabase = supabase.createClient(
            'https://jsuvimxjmjiljntmgbzu.supabase.co', 
            'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
        );

        async function saveProduct() {
            const { data, error } = await supabase.from('products').insert([
                { 
                    name: document.getElementById('name').value,
                    price: document.getElementById('price').value,
                    stock_quantity: document.getElementById('stock').value 
                }
            ]);

            if (error) {
                alert('Erreur : ' + error.message);
            } else {
                alert('Produit ajouté avec succès !');
                // Optionnel : vider les champs après ajout
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('stock').value = '';
            }
        }
    </script>
</body>
</html>
