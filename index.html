<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Tableau de bord Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; font-family: sans-serif; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #111; border-bottom: 2px solid #00ffff; position: sticky; top: 0; z-index: 100; }
        .menu-btn { cursor: pointer; font-size: 24px; color: #00ffff; }
        .header-title { font-size: 18px; font-weight: bold; color: white; text-transform: uppercase; }
        .stats-container { display: flex; gap: 10px; }
        .top-right-stats { background-color: #111; padding: 8px 12px; border-radius: 8px; border: 1px solid #00ffff; text-align: right; }
        .stats-label { font-size: 10px; color: #b0b0b0; }
        .stats-value { font-size: 16px; color: #00ffff; font-weight: bold; }

        .sidebar { height: 100%; width: 0; position: fixed; z-index: 200; top: 0; left: 0; background-color: #1a1a1a; transition: width 0.3s; padding-top: 80px; border-right: 2px solid #00ffff; overflow-x: hidden; }
        .sidebar a, .sidebar button { padding: 15px 20px; text-decoration: none; font-size: 18px; color: white; display: flex; align-items: center; gap: 10px; border: none; background: none; width: 100%; cursor: pointer; transition: 0.2s; }
        .sidebar a:hover, .sidebar button:hover { background-color: #222; color: #00ffff; }
        .sidebar.active { width: 250px; }
        
        .main-content { padding: 20px; }
        .graph-section { background-color: #111; border-radius: 10px; border: 1px solid #00ffff; width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; color: #00ffff; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-btn" onclick="toggleNav()"><i class="fas fa-bars"></i></div>
        <div class="header-title">Shadow Market - Admin</div>
        <div class="stats-container">
            <div class="top-right-stats">
                <span class="stats-label">Argent</span>
                <span class="stats-value" id="total-revenue">0 €</span>
            </div>
            <div class="top-right-stats">
                <span class="stats-label">Commandes</span>
                <span class="stats-value" id="total-orders">0</span>
            </div>
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
        <a href="commandes.html"><i class="fas fa-shopping-cart"></i> Commandes</a>
        <a href="produits.html"><i class="fas fa-box-open"></i> Produits</a> 
        <button onclick="window.location.href='formulaire.html'"><i class="fas fa-plus"></i> Ajouter Produit</button>
        
        <!-- Bouton pour gérer le logo de la boutique -->
        <button onclick="window.location.href='admin-logo.html'" style="color: #00ffff;">
            <i class="fas fa-camera"></i> Changer le Logo
        </button>
    </div>

    <div class="main-content">
        <h1>Tableau de bord Admin</h1>
        <div class="graph-section">Graphique des ventes</div>
    </div>

    <script>
        function toggleNav() {
            document.getElementById("sidebar").classList.toggle("active");
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://jsuvimxjmjiljntmgbzu.supabase.co', 
            'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
        );

        async function updateDashboardStats() {
            try {
                const { data: products } = await supabase.from('products').select('price');
                if (products) {
                    const total = products.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
                    document.getElementById('total-revenue').innerText = total + ' €';
                }

                const { count } = await supabase
                    .from('orders')
                    .select('*', { count: 'exact', head: true });

                if (count !== null) document.getElementById('total-orders').innerText = count;
            } catch (err) {
                console.log("Stats non chargées.");
            }
        }
        window.onload = updateDashboardStats;
    </script>
</body>
</html>
