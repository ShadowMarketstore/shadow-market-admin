<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; font-family: sans-serif; }
        
        /* En-tête */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #333; }
        .menu-btn { cursor: pointer; font-size: 24px; }
        .currency-icon { font-size: 24px; color: white; }

        /* Sidebar */
        .sidebar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background-color: #1a1a1a; transition: 0.5s; padding-top: 80px; z-index: 10; border-right: 2px solid #ff0000; }
        .sidebar a, .sidebar button { padding: 15px 25px; display: block; color: white; text-decoration: none; font-size: 18px; border: none; background: none; width: 100%; text-align: left; }
        .sidebar.active { width: 250px; }

        /* Dashboard */
        .content { padding: 20px; }
        .stats-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border-left: 4px solid #ff0000; width: fit-content; }
        .graph-placeholder { margin-top: 30px; width: 100%; height: 200px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; color: #555; }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-btn" onclick="toggleNav()">☰</div>
        <div>Shadow Market</div>
        <div class="currency-icon">€</div>
    </div>

    <div id="sidebar" class="sidebar">
        <a href="#"><i class="fas fa-home"></i> Accueil</a>
        <a href="#"><i class="fas fa-shopping-cart"></i> Commandes</a>
        <button onclick="alert('Ajout')"><i class="fas fa-plus"></i> Ajouter un produit</button>
    </div>

    <div class="content">
        <h2>Tableau de bord</h2>
        <div class="stats-card">
            <p>Argent généré</p>
            <h3 style="color: #ff0000; margin: 0;">0 €</h3>
        </div>
        <div class="graph-placeholder">
            [Zone du graphique - Courbe verte]
        </div>
    </div>

    <script>
        function toggleNav() { document.getElementById("sidebar").classList.toggle("active"); }
    </script>
</body>
</html>
