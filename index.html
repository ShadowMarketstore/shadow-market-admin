<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; font-family: sans-serif; overflow-x: hidden; }
        
        /* En-tête (Header) */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background-color: #111;
            border-bottom: 2px solid #00ffff; /* Bordure Cyan Néon */
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); /* Effet Néon */
        }
        
        /* Menu Burger (trois traits) */
        .menu-btn { cursor: pointer; font-size: 24px; color: #00ffff; /* Cyan Néon */ }
        
        /* Titre "Shadow Market" au centre */
        .header-title { font-size: 20px; font-weight: bold; color: white; text-transform: uppercase; }

        /* Bloc Statistique Compact en Haut à Droite (Argent Généré) */
        .top-right-stats {
            background-color: #1a1a1a; padding: 10px 15px; border-radius: 8px;
            border: 1px solid #00ffff; /* Bordure Cyan Néon */
            text-align: right;
        }
        .top-right-stats span { display: block; }
        .stats-label { font-size: 12px; color: #b0b0b0; margin-bottom: 3px; }
        .stats-value { font-size: 18px; color: #00ffff; /* Cyan Néon */ font-weight: bold; }

        /* Sidebar Vertical Correcte */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 10; top: 0; left: 0;
            background-color: #1a1a1a; overflow-x: hidden; transition: width 0.5s;
            padding-top: 80px; border-right: 2px solid #00ffff; /* Bordure Cyan Néon */
        }
        
        /* Style des liens dans la sidebar avec icônes */
        .sidebar a, .sidebar button {
            padding: 15px 25px; text-decoration: none; font-size: 18px;
            color: white; display: flex; align-items: center; gap: 10px;
            border: none; background: none; width: 100%; text-align: left; cursor: pointer;
        }
        .sidebar a:hover, .sidebar button:hover { color: #00ffff; /* Cyan Néon */ }
        
        /* Sidebar Active - Largeur visible */
        .sidebar.active { width: 250px; }
        
        /* Contenu Principal - Zone pour le Dashboard */
        .main-content { margin-left: 0; padding: 20px; transition: margin-left 0.5s; }
        .sidebar.active ~ .main-content { margin-left: 250px; }

        h1 { margin-top: 0; color: white; font-size: 24px; }

        /* Zone pour le Graphique (Placeholder) */
        .graph-section {
            background-color: #1a1a1a; border-radius: 10px;
            border: 1px solid #00ffff; /* Bordure Cyan Néon */
            width: 100%; height: 300px;
            display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 18px; margin-top: 30px;
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="menu-btn" onclick="toggleNav()">☰</div>
        
        <div class="header-title">Shadow Market</div>
        
        <div class="top-right-stats">
            <span class="stats-label">Argent généré</span>
            <span class="stats-value">0 €</span>
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <a href="#"><i class="fas fa-home"></i> Accueil</a>
        <a href="#"><i class="fas fa-shopping-cart"></i> Commandes</a>
        <button onclick="addProduct()"><i class="fas fa-plus"></i> Ajouter un produit</button>
    </div>

    <div class="main-content">
        <h1>Tableau de bord</h1>
        
        <div class="graph-section">
            [Zone du graphique - Courbe verte]
        </div>
    </div>

    <script>
        // Fonction pour ouvrir/fermer la sidebar
        function toggleNav() {
            document.getElementById("sidebar").classList.toggle("active");
        }
        
        function addProduct() {
            alert("Ouverture du formulaire d'ajout...");
        }
    </script>
</body>
</html>
