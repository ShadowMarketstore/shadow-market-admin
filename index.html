<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; font-family: sans-serif; }
        .menu-btn { cursor: pointer; padding: 20px; font-size: 24px; }
        .sidebar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background-color: #1a1a1a; transition: 0.5s; padding-top: 60px; border-right: 2px solid #ff0000; }
        .sidebar a, .sidebar button { padding: 15px 25px; text-decoration: none; font-size: 18px; color: white; display: block; background: none; border: none; width: 100%; text-align: left; }
        .sidebar a:hover { color: #ff0000; }
        .sidebar.active { width: 250px; }
        
        /* Contenu principal */
        .main-content { padding: 20px; }
        .stats-card { background: #1a1a1a; padding: 20px; border-radius: 10px; border-left: 5px solid #ff0000; display: inline-block; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleNav()">☰</div>

    <div id="sidebar" class="sidebar">
        <a href="#"><i class="fas fa-home"></i> Accueil</a>
        <a href="#"><i class="fas fa-shopping-cart"></i> Commandes</a>
        <button onclick="addProduct()"><i class="fas fa-plus"></i> Ajouter un produit</button>
    </div>

    <div class="main-content">
        <h1>Tableau de bord</h1>
        <div class="stats-card">
            <h3>Argent généré</h3>
            <p style="font-size: 24px; color: #ff0000;">0 FCFA</p>
        </div>
    </div>

    <script>
        function toggleNav() { document.getElementById("sidebar").classList.toggle("active"); }
        function addProduct() { alert("Ouverture du formulaire..."); }
    </script>
</body>
</html>
